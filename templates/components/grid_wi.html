<!-- === 模式 2: 世界书网格 (包含滚动、拖拽、分页) === -->
<div x-show="currentMode === 'worldinfo'" x-data="wiGrid" class="flex-1 min-h-0 flex flex-col overflow-hidden w-full relative">

    <!-- 滚动区域 -->
    <div id="wi-scroll-area" class="scroll-container-y flex-1 min-h-0 p-4 custom-scrollbar relative"
        @dragover.prevent="dragOverWi = true" @dragleave.prevent="dragOverWi = false"
        @drop.prevent="handleWiFilesDrop($event)">

        <!-- 拖拽上传遮罩 -->
        <div x-show="dragOverWi" x-transition.opacity class="drag-over-main-overlay">
            <div class="text-6xl mb-4">🌎</div>
            <div class="text-2xl font-bold text-white tracking-wider">松开鼠标上传世界书</div>
            <div class="text-gray-300 mt-2 text-sm" x-text="wiUploadHintText"></div>
        </div>

        <div x-show="isLoading" style="text-align: center; padding: 5rem; color: var(--accent-light);">
            数据加载中...</div>

        <!-- 网格列表 -->
        <div x-show="!isLoading"
            class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5 gap-4">
            <template x-for="item in wiList" :key="getWorldInfoRenderKey(item)">
                <div @click="handleWorldInfoClick($event, item)"
                    class="wi-grid-card group relative border rounded-xl p-3 cursor-pointer transition-all duration-200 flex flex-col"
                    :class="[$store.global.deviceType === 'mobile' ? '' : 'h-52', selectedIds.includes(item.id) ? 'selected' : '', canSelectWorldInfoItem(item) ? '' : 'is-selection-disabled', isWorldInfoFlipped(item.id) ? 'is-flipped' : '']"
                    :data-wi-id="item.id"
                    draggable="true" @dragstart="dragStart($event, item)" @mouseenter="handleWorldInfoMouseEnter(item.id)"
                    @mouseleave="handleWorldInfoMouseLeave(item.id)"
                    style="background: var(--bg-panel); border-color: var(--border-main);">

                    <div class="card-flip-inner" :class="{'is-flipped': isWorldInfoFlipped(item.id)}">
                        <div class="card-face card-front wi-card-front">

                            <!-- 来源标记：固定左上 -->
                            <div class="wi-badge" :class="item.source_type || item.type"
                                x-text="getWorldInfoSourceBadge(item)">
                            </div>

                            <!-- FILE 徽标：固定右上（去掉 inline style） -->
                            <div x-show="item.name_source === 'filename'" class="wi-badge file">FILE</div>

                            <!-- Hover 工具：编辑（保留原功能） -->
                            <button x-show="$store.global.deviceType !== 'mobile'" @click.stop="openWorldInfoEditor(item)"
                                class="wi-grid-tool-btn absolute top-2 right-2 w-9 h-9 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all duration-200 z-20 shadow-md"
                                title="打开全屏编辑器">
                                ✏️
                            </button>

                            <button type="button" x-show="canSelectWorldInfoItem(item)" class="card-select-indicator card-select-overlay"
                                :class="{ 'is-selected': selectedIds.includes(item.id), 'is-mobile': $store.global.deviceType === 'mobile' }"
                                @click.stop="toggleSelection(item)" title="选择世界书">
                                <div class="w-6 h-6 rounded-full border-2 flex items-center justify-center transition-all duration-200 shadow-sm"
                                    :class="selectedIds.includes(item.id) ? 'bg-blue-600 border-blue-500 text-white scale-105' : 'bg-black/25 border-gray-400/60 hover:bg-black/50 hover:border-white/80 text-white/80'">
                                    <span x-show="selectedIds.includes(item.id)" class="text-xs font-bold">✓</span>
                                </div>
                            </button>

                            <!-- 封面区 -->
                            <div x-show="$store.global.deviceType !== 'mobile'" class="wi-book-cover mt-6">
                                <div class="wi-book-icon">📖</div>
                            </div>

                            <!-- 标题区 -->
                            <div class="wi-book-title" :class="$store.global.deviceType === 'mobile' ? 'mt-4' : ''">
                                <h3 class="font-bold text-base leading-tight line-clamp-2"
                                    :class="item.name_source === 'filename' ? 'wi-title-fallback' : ''"
                                    style="color: var(--text-main);" x-text="item.name"></h3>
                            </div>

                            <!-- 信息条 -->
                            <div class="wi-book-meta">
                                <div class="flex items-center gap-1 min-w-0 flex-1">
                                    <template x-if="getWorldInfoOwnerName(item)">
                                        <div class="flex items-center gap-1 truncate" title="关联角色">
                                            <span>🔗</span>
                                            <span class="truncate hover:text-[var(--text-main)] hover:underline"
                                                @click.stop="jumpToCardFromWi(getWorldInfoOwnerId(item))" x-text="getWorldInfoOwnerName(item)"></span>
                                        </div>
                                    </template>
                                    <template x-if="!getWorldInfoOwnerName(item)">
                                        <span class="opacity-60 truncate">Global Lorebook</span>
                                    </template>
                                </div>
                                <div class="font-mono opacity-70 whitespace-nowrap" x-text="new Date(item.mtime * 1000).toLocaleDateString()">
                                </div>
                            </div>
                        </div>

                        <div class="card-face card-back wi-card-back">
                            <div class="card-back-header">
                                <p class="card-back-title">文件名</p>
                                <p class="card-back-filename" :title="item.file_name || item.name"
                                    x-text="item.file_name || item.name || '未知文件名'"></p>
                                <div class="card-back-category"
                                    :title="formatCategoryLabel(getWorldInfoDisplayCategory(item))">
                                    <span class="card-back-category-icon">📁</span>
                                    <span class="card-back-category-text" x-text="formatCategoryLabel(getWorldInfoDisplayCategory(item))"></span>
                                </div>
                            </div>
                            <div class="card-info card-back-info">
                                <div class="card-back-times">
                                    <div class="card-back-time-row" :title="`修改时间：${new Date(item.mtime * 1000).toLocaleString()}`">
                                        <span class="card-back-time-label">修改</span>
                                        <span class="card-back-time-value" x-text="new Date(item.mtime * 1000).toLocaleDateString()"></span>
                                    </div>
                                    <div class="card-back-time-row" :title="`来源：${getWorldInfoSourceBadge(item)}`">
                                        <span class="card-back-time-label">来源</span>
                                        <span class="card-back-time-value" x-text="getWorldInfoSourceBadge(item)"></span>
                                    </div>
                                </div>
                                <div class="local-note-preview wi-back-note custom-scrollbar" @click.stop
                                    :class="item.ui_summary ? 'note-text' : 'note-placeholder'" title="本地备注"
                                    x-text="item.ui_summary || '无本地备注...'"></div>
                            </div>
                        </div>
                    </div>

                    <div class="card-bottom-toolbar wi-card-bottom-toolbar" @click.stop>
                        <button type="button" class="card-local-note-btn"
                            :class="worldInfoHasLocalNote(item) ? 'has-note' : 'no-note'"
                            :disabled="!worldInfoHasLocalNote(item)"
                            :title="worldInfoHasLocalNote(item) ? '查看本地备注预览' : '暂无本地备注'"
                            @click.stop="openWorldInfoLocalNote(item)">
                            📝
                        </button>
                    </div>

                    <button type="button" class="card-flip-corner wi-item-flip-corner"
                        :class="[isWorldInfoFlipped(item.id) ? 'is-active' : '', $store.global.deviceType === 'mobile' ? 'is-mobile' : '']"
                        :aria-label="isWorldInfoFlipped(item.id) ? '翻回正面' : '翻到背面'"
                        @click.stop="toggleWorldInfoFace(item.id)"
                        :title="isWorldInfoFlipped(item.id) ? '翻回正面' : '翻到背面'"></button>
                </div>
            </template>
        </div>

        <div x-show="!isLoading && wiList.length===0" class="text-center py-20 text-[var(--text-dim)]">
            <p class="text-lg">没有找到世界书</p>
            <p class="text-sm mt-2">（拖拽 .json 文件到此处添加）</p>
        </div>
    </div>

    <!-- 底部翻页栏 (World Info 专用) -->
    <div class="pagination-bar" x-show="wiList.length > 0 || wiCurrentPage > 1" style="flex-shrink: 0;">
        <div class="card-pagination-summary">
            <span style="font-size: 0.75rem; color: var(--text-dim);">共 <span x-text="wiTotalItems"></span>
                本</span>
            <div class="card-flip-toolbar" x-show="wiList.length > 0">
                <button @click="toggleWorldInfoBulkFlipMode()" class="btn-secondary card-flip-all-btn"
                    :title="worldInfoBulkBackMode ? '将当前页全部翻回正面（并关闭背面模式）' : '将当前页全部翻到背面（并保持背面模式）'">
                    <span x-show="$store.global.deviceType !== 'mobile' && !worldInfoBulkBackMode">一键翻到背面</span>
                    <span x-show="$store.global.deviceType !== 'mobile' && worldInfoBulkBackMode">一键翻回正面</span>
                    <span x-show="$store.global.deviceType === 'mobile' && !worldInfoBulkBackMode">翻面</span>
                    <span x-show="$store.global.deviceType === 'mobile' && worldInfoBulkBackMode">正面</span>
                </button>
                <span x-show="$store.global.deviceType !== 'mobile'" class="card-flip-count"
                    x-text="`背面 ${visibleWorldInfoFlippedCount}/${wiList.length}`"></span>
            </div>
        </div>
        <div style="display: flex; align-items: center; gap:  0.5rem;">
            <button @click="changeWiPage(wiCurrentPage-1)" :disabled="wiCurrentPage===1" class="btn-secondary"
                style="padding: 0.25rem 0.5rem;">上一页</button>
            <span
                style="padding: 0.25rem 0.5rem; background: var(--bg-sub); border-radius: 0.25rem; color: var(--text-main); font-size: 0.75rem; height: 100%;"
                x-text="wiCurrentPage + '/' + wiTotalPages"></span>
            <button @click="changeWiPage(wiCurrentPage+1)" :disabled="wiCurrentPage===wiTotalPages"
                class="btn-secondary" style="padding: 0.25rem 0.5rem;">下一页</button>
        </div>
    </div>
</div>
