{% macro package_detail_cards() %}
  <div class="beautify-detail-card">
    <div class="beautify-detail-heading">当前变体</div>
    <div class="beautify-detail-kv">
      <span>平台</span><span x-text="activeVariant?.platform || '-' "></span>
    </div>
    <div class="beautify-detail-kv">
      <span>主题</span><span x-text="activeVariant?.theme_name || '-' "></span>
    </div>
    <div class="beautify-detail-kv">
      <span>待确认</span><span
        x-text="activeVariant?.preview_hint?.needs_platform_review ? '需要人工确认' : '已确认' "
      ></span>
    </div>
  </div>

  <div class="beautify-detail-card">
    <div class="beautify-detail-heading">壁纸</div>
    <div class="beautify-wallpaper-list" x-show="wallpaperOptions.length > 0">
      <template x-for="wallpaper in wallpaperOptions" :key="wallpaper.id">
        <button
          type="button"
          class="beautify-wallpaper-item cursor-pointer"
          :class="selectedWallpaperId === wallpaper.id ? 'is-active' : ''"
          @click="selectWallpaper(wallpaper.id)"
        >
          <span
            class="beautify-wallpaper-thumb"
            :style="`background-image:url('${wallpaperPreviewUrl(wallpaper.file)}')`"
          ></span>
          <span class="beautify-wallpaper-info">
            <span class="beautify-wallpaper-name" x-text="wallpaper.filename"></span>
            <span
              class="beautify-wallpaper-size"
              x-text="`${wallpaper.width} × ${wallpaper.height}`"
            ></span>
          </span>
        </button>
      </template>
    </div>
    <div class="beautify-empty-inline" x-show="wallpaperOptions.length === 0">
      当前变体还没有绑定壁纸。
    </div>
  </div>

  <div class="beautify-detail-card">
    <div class="beautify-detail-heading">截图</div>
    <div class="beautify-screenshot-list" x-show="screenshotOptions.length > 0">
      <template x-for="screenshot in screenshotOptions" :key="screenshot.id">
        <button
          type="button"
          class="beautify-screenshot-item cursor-pointer"
          :class="activeScreenshot?.id === screenshot.id ? 'is-active' : ''"
          @click="selectScreenshot(screenshot.id)"
        >
          <span
            class="beautify-screenshot-thumb"
            :style="`background-image:url('${wallpaperPreviewUrl(screenshot.file)}')`"
          ></span>
          <span class="beautify-wallpaper-info">
            <span class="beautify-wallpaper-name" x-text="screenshot.filename"></span>
            <span
              class="beautify-wallpaper-size"
              x-text="`${screenshot.width} × ${screenshot.height}`"
            ></span>
          </span>
        </button>
      </template>
    </div>
    <div class="beautify-empty-inline" x-show="screenshotOptions.length === 0">
      还没有导入截图。
    </div>
  </div>

  <div class="beautify-detail-card">
    <div class="beautify-detail-heading">角色与用户覆盖</div>
    <div class="beautify-settings-form-grid">
      <label class="beautify-settings-field">
        <span>角色覆盖</span>
        <input
          type="text"
          class="beautify-filter-input"
          x-model="packageCharacterName"
          placeholder="未设置，将使用全局默认角色资料"
        />
        <div
          class="beautify-empty-inline"
          x-text="activePackage?.identity_overrides?.character?.avatar_file ? '当前角色头像已覆盖全局设置' : '未设置，将使用全局默认角色资料'"
        ></div>
        <div class="beautify-stage-actions">
          <label class="beautify-action-btn cursor-pointer">
            <input
              type="file"
              class="hidden"
              accept="image/*"
              @change="handlePackageAvatarFile('character', $event.target.files); $event.target.value = ''"
            />
            上传角色头像
          </label>
          <button
            type="button"
            class="beautify-soft-btn"
            @click="clearPackageCharacterAvatar()"
          >
            清除角色头像
          </button>
        </div>
      </label>
      <label class="beautify-settings-field">
        <span>用户覆盖</span>
        <input
          type="text"
          class="beautify-filter-input"
          x-model="packageUserName"
          placeholder="未设置，将使用全局默认用户资料"
        />
        <div
          class="beautify-empty-inline"
          x-text="activePackage?.identity_overrides?.user?.avatar_file ? '当前用户头像已覆盖全局设置' : '未设置，将使用全局默认用户资料'"
        ></div>
        <div class="beautify-stage-actions">
          <label class="beautify-action-btn cursor-pointer">
            <input
              type="file"
              class="hidden"
              accept="image/*"
              @change="handlePackageAvatarFile('user', $event.target.files); $event.target.value = ''"
            />
            上传用户头像
          </label>
          <button
            type="button"
            class="beautify-soft-btn"
            @click="clearPackageUserAvatar()"
          >
            清除用户头像
          </button>
        </div>
      </label>
    </div>
    <div class="beautify-stage-actions">
      <button
        type="button"
        class="beautify-primary-btn"
        @click="savePackageIdentityOverrides()"
      >
        保存覆盖
      </button>
    </div>
  </div>
{% endmacro %}

<div
  x-show="$store.global.currentMode === 'beautify'"
  x-cloak
  style="display: none"
  class="beautify-layout"
>
  <section class="beautify-stage-pane" x-data="beautifyPreviewFrame">
    <template x-if="beautifyWorkspace === 'settings'">
      <div class="beautify-settings-shell custom-scrollbar">
        <div class="beautify-detail-card">
          <div class="beautify-detail-heading">全局壁纸</div>
          <div class="beautify-stage-actions">
            <label class="beautify-action-btn cursor-pointer">
              <input
                type="file"
                class="hidden"
                accept="image/*"
                @change="handleGlobalWallpaperFiles($event.target.files); $event.target.value = ''"
              />
              上传全局壁纸
            </label>
            <button
              type="button"
              class="beautify-soft-btn"
              @click="clearGlobalWallpaper()"
            >
              清除全局壁纸
            </button>
          </div>

          <div
            x-data="sharedWallpaperPicker({ sourceFilter: 'all', selectionTarget: 'preview' })"
            class="mt-4"
          >
            <div class="beautify-detail-heading">共享壁纸库</div>
            <div class="beautify-stage-actions">
              <button
                type="button"
                class="beautify-soft-btn"
                :class="sourceFilter === 'all' ? 'is-active' : ''"
                @click="setSourceFilter('all')"
              >
                全部
              </button>
              <button
                type="button"
                class="beautify-soft-btn"
                :class="sourceFilter === 'builtin' ? 'is-active' : ''"
                @click="setSourceFilter('builtin')"
              >
                内置
              </button>
              <button
                type="button"
                class="beautify-soft-btn"
                :class="sourceFilter === 'imported' ? 'is-active' : ''"
                @click="setSourceFilter('imported')"
              >
                用户导入
              </button>
              <button
                type="button"
                class="beautify-soft-btn"
                :class="sourceFilter === 'beautify' ? 'is-active' : ''"
                @click="setSourceFilter('beautify')"
              >
                Beautify 导入
              </button>
            </div>
            <div
              class="beautify-settings-wallpaper-grid mt-3"
              x-show="filteredWallpapers.length > 0"
            >
              <template x-for="item in filteredWallpapers" :key="item.id">
                <button
                  type="button"
                  class="beautify-settings-wallpaper-card cursor-pointer"
                  :class="isSelected(item) ? 'is-active' : ''"
                  @click="selectGlobalWallpaper(item.id)"
                >
                  <span
                    class="beautify-settings-wallpaper-thumb"
                    :style="`background-image:url('${wallpaperPreviewUrl(item.file)}')`"
                  ></span>
                  <span class="beautify-wallpaper-info">
                    <span
                      class="beautify-wallpaper-name"
                      x-text="item.filename || item.id"
                    ></span>
                    <span
                      class="beautify-wallpaper-size"
                      x-text="item.source_type || 'imported'"
                    ></span>
                  </span>
                </button>
              </template>
            </div>
            <div
              class="beautify-empty-inline mt-3"
              x-show="filteredWallpapers.length === 0"
            >
              当前筛选下还没有可用共享壁纸。
            </div>
            <div
              class="beautify-empty-copy mt-2"
              x-show="$store.global.beautifyGlobalSettings?.preview_wallpaper_id"
            >
              当前预览壁纸 ID：<span
                x-text="$store.global.beautifyGlobalSettings?.preview_wallpaper_id"
              ></span>
            </div>
          </div>
        </div>

        <div class="beautify-detail-card">
          <div class="beautify-detail-heading">角色默认资料</div>
          <div class="beautify-settings-form-grid">
            <input
              type="text"
              class="beautify-filter-input"
              x-model="globalCharacterName"
              placeholder="角色默认名称"
            />
            <div class="beautify-stage-actions">
              <label class="beautify-action-btn cursor-pointer">
                <input
                  type="file"
                  class="hidden"
                  accept="image/*"
                  @change="handleGlobalAvatarFile('character', $event.target.files); $event.target.value = ''"
                />
                上传角色头像
              </label>
              <button
                type="button"
                class="beautify-soft-btn"
                @click="clearGlobalCharacterAvatar()"
              >
                清除角色头像
              </button>
            </div>
          </div>
        </div>

        <div class="beautify-detail-card">
          <div class="beautify-detail-heading">用户默认资料</div>
          <div class="beautify-settings-form-grid">
            <input
              type="text"
              class="beautify-filter-input"
              x-model="globalUserName"
              placeholder="用户默认名称"
            />
            <div class="beautify-stage-actions">
              <label class="beautify-action-btn cursor-pointer">
                <input
                  type="file"
                  class="hidden"
                  accept="image/*"
                  @change="handleGlobalAvatarFile('user', $event.target.files); $event.target.value = ''"
                />
                上传用户头像
              </label>
              <button
                type="button"
                class="beautify-soft-btn"
                @click="clearGlobalUserAvatar()"
              >
                清除用户头像
              </button>
            </div>
          </div>
          <div class="beautify-stage-actions">
            <button
              type="button"
              class="beautify-primary-btn"
              @click="saveGlobalSettings()"
            >
              保存全局设置
            </button>
          </div>
        </div>

        <div class="beautify-detail-card">
          <div class="beautify-detail-heading">全局默认预览</div>
          <div class="beautify-empty-copy">
            不会带入当前包的主题与覆盖，只显示全局默认效果。
          </div>
          <div class="beautify-settings-preview-layout">
            <div class="beautify-settings-preview-column">
              <div class="beautify-settings-preview-stage">
              <div class="beautify-preview-scene-switcher">
                <template x-for="scene in previewScenes" :key="scene.id">
                  <button
                    type="button"
                    class="beautify-preview-scene-btn"
                    :class="activePreviewScene?.id === scene.id ? 'is-active' : ''"
                    @click="setPreviewScene(scene.id)"
                  >
                    <span
                      class="beautify-preview-scene-label"
                      x-text="scene.label"
                    ></span>
                    <span
                      class="beautify-preview-scene-description"
                      x-text="scene.description"
                    ></span>
                  </button>
                </template>
              </div>

                <template x-if="isMobileFullscreenEnabled() && !showMobileFullscreen">
                  <div
                    class="beautify-preview-unloaded-card beautify-settings-preview-card beautify-mobile-entry-card"
                  >
                    <button
                      type="button"
                      class="beautify-primary-btn"
                      @click="openMobileFullscreen('preview'); loadPreview()"
                    >
                      加载全局默认预览
                    </button>
                  </div>
                </template>

                <template x-if="!isMobileFullscreenEnabled() && !isPreviewLoaded">
                  <div
                    class="beautify-preview-unloaded-card beautify-settings-preview-card"
                  >
                    <button
                      type="button"
                      class="beautify-primary-btn"
                      @click="loadPreview()"
                    >
                      加载全局默认预览
                    </button>
                  </div>
                </template>

                <template x-if="!isMobileFullscreenEnabled() && isPreviewLoaded">
                  <div
                    class="beautify-preview-frame-shell beautify-settings-preview-shell"
                    :class="previewShellMode === 'mobile' ? 'is-mobile' : 'is-pc'"
                  >
                    <div
                      x-ref="previewHost"
                      class="beautify-preview-host"
                      :data-preview-platform="previewShellMode"
                      data-runtime-owner="beautify-preview"
                      data-runtime-label="Beautify Native ST Preview"
                    ></div>
                  </div>
                </template>
              </div>
            </div>
            <div class="beautify-settings-preview-sidebar-gap"></div>
          </div>
        </div>
      </div>
    </template>

    <template x-if="beautifyWorkspace !== 'settings' && activePackage">
      <div class="beautify-stage-shell">
        <div class="beautify-stage-header">
          <div>
            <div class="beautify-stage-title" x-text="activePackage.name"></div>
            <div class="beautify-stage-subtitle">
              <span x-text="activeVariant?.theme_name || '未选择变体'"></span>
              <span>·</span>
              <span x-text="activeWallpaper?.filename || '纯主题预览'"></span>
            </div>
          </div>
          <div class="beautify-stage-header-actions">
            <button
              type="button"
              class="beautify-soft-btn"
              @click="removeCurrentPackage()"
            >
              删除包
            </button>
            <select
              class="beautify-filter-select"
              x-show="activeVariant"
              :value="activeVariant?.platform || 'pc'"
              @change="updateCurrentVariantPlatform($event.target.value)"
            >
              <option value="pc">PC</option>
              <option value="mobile">移动端</option>
              <option value="dual">双端</option>
            </select>
            <button
              type="button"
              class="beautify-soft-btn"
              x-show="!isMobileBeautifyViewport()"
              @click="togglePackageDetailCollapsed()"
              x-text="packageDetailCollapsed ? '展开详情' : '收起详情'"
            ></button>
          </div>
        </div>

        <div class="beautify-stage-controls">
          <div class="beautify-workspace-switcher beautify-stage-mode-switches">
            <div class="beautify-workspace-switch">
              <button
                type="button"
                class="beautify-device-btn"
                :class="stageMode === 'preview' ? 'is-active' : ''"
                @click="setStageMode('preview')"
              >
                原生预览
              </button>
              <button
                type="button"
                class="beautify-device-btn"
                :class="stageMode === 'screenshot' ? 'is-active' : ''"
                @click="setStageMode('screenshot')"
              >
                截图查看
              </button>
            </div>
          </div>
          <div class="beautify-device-switches">
            <button
              type="button"
              class="beautify-device-btn"
              :class="selectedVariantPlatform === 'pc' ? 'is-active' : ''"
              :disabled="stageMode === 'screenshot' || !hasPcVariant"
              @click="previewPlatform('pc')"
            >
              PC
            </button>
            <button
              type="button"
              class="beautify-device-btn"
              :class="selectedVariantPlatform === 'mobile' ? 'is-active' : ''"
              :disabled="stageMode === 'screenshot' || !hasMobileVariant"
              @click="previewPlatform('mobile')"
            >
              移动端
            </button>
            <button
              type="button"
              class="beautify-device-btn"
              :class="selectedVariantPlatform === 'dual' ? 'is-active' : ''"
              :disabled="stageMode === 'screenshot' || !hasDualVariant"
              @click="previewPlatform('dual')"
            >
              双端
            </button>
          </div>
          <div class="beautify-stage-actions">
            <button
              type="button"
              class="beautify-soft-btn"
              @click="cycleWallpaper()"
              :disabled="stageMode === 'screenshot' || wallpaperOptions.length === 0"
            >
              壁纸切换
            </button>
          </div>
        </div>

        <template x-if="!showMobileFullscreen">
          <div
            class="beautify-stage-body"
            :class="packageDetailCollapsed ? 'is-detail-collapsed' : ''"
          >
            <div class="beautify-preview-column">
              <template x-if="stageMode === 'preview'">
                <div class="beautify-preview-stage">
                  <div class="beautify-preview-scene-switcher">
                    <template x-for="scene in previewScenes" :key="scene.id">
                      <button
                        type="button"
                        class="beautify-preview-scene-btn"
                        :class="activePreviewScene?.id === scene.id ? 'is-active' : ''"
                        @click="setPreviewScene(scene.id)"
                      >
                        <span
                          class="beautify-preview-scene-label"
                          x-text="scene.label"
                        ></span>
                        <span
                          class="beautify-preview-scene-description"
                          x-text="scene.description"
                        ></span>
                      </button>
                    </template>
                  </div>

                  <template x-if="isMobileFullscreenEnabled()">
                    <div
                      class="beautify-preview-unloaded-card beautify-mobile-entry-card"
                    >
                      <div class="beautify-detail-heading">原生 ST 预览</div>
                      <div class="beautify-empty-copy">
                        点击后进入全屏演示。返回时会自动销毁当前渲染内容。
                      </div>
                      <button
                        type="button"
                        class="beautify-primary-btn"
                        @click="openMobileFullscreen('preview'); loadPreview()"
                      >
                        加载原生 ST 预览
                      </button>
                    </div>
                  </template>

                  <template
                    x-if="!isMobileFullscreenEnabled() && !isPreviewLoaded"
                  >
                    <div class="beautify-preview-unloaded-card">
                      <div class="beautify-detail-heading">原生 ST 预览</div>
                      <div class="beautify-empty-copy">
                        预览默认不加载。点击后会按需加载原生 ST
                        样式、图标和相关资源。
                      </div>
                      <button
                        type="button"
                        class="beautify-primary-btn"
                        @click="loadPreview()"
                      >
                        加载原生 ST 预览
                      </button>
                    </div>
                  </template>

                  <template
                    x-if="!isMobileFullscreenEnabled() && isPreviewLoaded"
                  >
                    <div
                      class="beautify-preview-frame-shell"
                      :class="previewShellMode === 'mobile' ? 'is-mobile' : 'is-pc'"
                    >
                      <div
                        x-ref="previewHost"
                        class="beautify-preview-host"
                        :data-preview-platform="previewShellMode"
                        data-runtime-owner="beautify-preview"
                        data-runtime-label="Beautify Native ST Preview"
                      ></div>
                    </div>
                  </template>
                </div>
              </template>

              <template
                x-if="stageMode === 'screenshot' && isMobileFullscreenEnabled()"
              >
                <div
                  class="beautify-screenshot-stage beautify-mobile-entry-card"
                >
                  <div class="beautify-screenshot-stage-copy">
                    <div class="beautify-detail-heading">截图查看</div>
                    <div class="beautify-empty-copy">
                      点击后进入全屏截图查看。返回后直接回到当前工作台。
                    </div>
                    <button
                      type="button"
                      class="beautify-primary-btn"
                      @click="openMobileFullscreen('screenshot')"
                    >
                      进入截图全屏查看
                    </button>
                  </div>
                </div>
              </template>

              <template
                x-if="stageMode === 'screenshot' && !isMobileFullscreenEnabled()"
              >
                <div class="beautify-screenshot-stage">
                  <template x-if="activeScreenshot">
                    <img
                      class="beautify-screenshot-stage-image"
                      :src="wallpaperPreviewUrl(activeScreenshot?.file || '')"
                      :alt="activeScreenshot?.filename || '截图预览'"
                    />
                  </template>

                  <template x-if="!activeScreenshot">
                    <div class="beautify-screenshot-stage-copy">
                      <div class="beautify-detail-heading">截图查看</div>
                      <div class="beautify-empty-copy">
                        从侧边栏导入截图后，可在这里对照当前美化包的效果。
                      </div>
                      <div class="beautify-empty-inline">暂未选择截图。</div>
                    </div>
                  </template>
                </div>
              </template>
            </div>

            <template x-if="!packageDetailCollapsed">
              <div class="beautify-detail-column">
                {{ package_detail_cards() }}
              </div>
            </template>
          </div>

          <template
            x-if="packageDetailCollapsed && packageDetailDrawerOpen && !isMobileBeautifyViewport()"
          >
            <div
              class="beautify-package-detail-drawer"
              @click.self="closePackageDetailDrawer()"
            >
              <div class="beautify-package-detail-drawer-panel">
                <div class="beautify-stage-header-actions">
                  <button
                    type="button"
                    class="beautify-soft-btn"
                    @click="closePackageDetailDrawer()"
                  >
                    关闭详情
                  </button>
                </div>
                <div class="beautify-detail-column">
                  {{ package_detail_cards() }}
                </div>
              </div>
            </div>
          </template>
        </template>
      </div>
    </template>

    <template x-if="showMobileFullscreen">
      <div class="beautify-mobile-fullscreen">
        <div class="beautify-mobile-topbar">
          <button
            type="button"
            class="beautify-soft-btn beautify-mobile-back-btn"
            @click="closeMobilePreviewAndReset()"
          >
            返回
          </button>

          <template x-if="beautifyWorkspace === 'settings'">
            <div class="beautify-detail-heading">全局默认预览</div>
          </template>

          <template
            x-if="beautifyWorkspace !== 'settings' && stageMode === 'preview'"
          >
            <div class="beautify-mobile-topbar-actions">
              <div
                class="beautify-device-switches beautify-mobile-device-switches"
              >
                <button
                  type="button"
                  class="beautify-device-btn"
                  :class="selectedVariantPlatform === 'pc' ? 'is-active' : ''"
                  :disabled="!hasPcVariant"
                  @click="previewPlatform('pc')"
                >
                  PC
                </button>
                <button
                  type="button"
                  class="beautify-device-btn"
                  :class="selectedVariantPlatform === 'mobile' ? 'is-active' : ''"
                  :disabled="!hasMobileVariant"
                  @click="previewPlatform('mobile')"
                >
                  移动端
                </button>
                <button
                  type="button"
                  class="beautify-device-btn"
                  :class="selectedVariantPlatform === 'dual' ? 'is-active' : ''"
                  :disabled="!hasDualVariant"
                  @click="previewPlatform('dual')"
                >
                  双端
                </button>
              </div>
              <button
                type="button"
                class="beautify-soft-btn"
                @click="cycleWallpaper()"
                :disabled="wallpaperOptions.length === 0"
              >
                壁纸切换
              </button>
            </div>
          </template>

          <template
            x-if="beautifyWorkspace !== 'settings' && stageMode === 'screenshot'"
          >
            <div class="beautify-detail-heading">截图查看</div>
          </template>
        </div>

        <div class="beautify-mobile-stage">
          <template x-if="stageMode === 'preview'">
            <div class="beautify-preview-stage beautify-mobile-preview-stage">
              <template x-if="!isPreviewLoaded">
                <div class="beautify-preview-unloaded-card">
                  <div class="beautify-detail-heading">
                    <span
                      x-text="beautifyWorkspace === 'settings' ? '全局默认预览' : '原生 ST 预览'"
                    ></span>
                  </div>
                  <div class="beautify-empty-copy">
                    预览默认不加载。点击后会按需加载原生 ST
                    样式、图标和相关资源。
                  </div>
                  <button
                    type="button"
                    class="beautify-primary-btn"
                    @click="loadPreview()"
                  >
                    <span
                      x-text="beautifyWorkspace === 'settings' ? '加载全局默认预览' : '加载原生 ST 预览'"
                    ></span>
                  </button>
                </div>
              </template>

              <template x-if="isPreviewLoaded">
                <div
                  class="beautify-preview-frame-shell"
                  :class="previewShellMode === 'mobile' ? 'is-mobile' : 'is-pc'"
                >
                  <div
                    x-ref="previewHost"
                    class="beautify-preview-host"
                    :data-preview-platform="previewShellMode"
                    data-runtime-owner="beautify-preview"
                    data-runtime-label="Beautify Native ST Preview"
                  ></div>
                </div>
              </template>
            </div>
          </template>

          <template x-if="stageMode === 'screenshot'">
            <div
              class="beautify-screenshot-stage beautify-mobile-screenshot-stage"
            >
              <template x-if="activeScreenshot">
                <img
                  class="beautify-screenshot-stage-image"
                  :src="wallpaperPreviewUrl(activeScreenshot?.file || '')"
                  :alt="activeScreenshot?.filename || '截图预览'"
                />
              </template>

              <template x-if="!activeScreenshot">
                <div class="beautify-screenshot-stage-copy">
                  <div class="beautify-detail-heading">截图查看</div>
                  <div class="beautify-empty-copy">
                    从侧边栏导入截图后，可在这里对照当前美化包的效果。
                  </div>
                  <div class="beautify-empty-inline">暂未选择截图。</div>
                </div>
              </template>
            </div>
          </template>
        </div>
      </div>
    </template>

    <template x-if="beautifyWorkspace !== 'settings' && !activePackage">
      <div class="beautify-stage-placeholder">
        <div class="beautify-empty-title">选择一个美化包开始预览</div>
        <div class="beautify-empty-copy">
          右侧舞台可按需加载原生 ST 预览，用于检查当前主题与壁纸效果。
        </div>
      </div>
    </template>
  </section>
</div>
