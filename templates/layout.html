<!-- templates/layout.html -->
<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="referrer" content="no-referrer" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <title>ST Manager Pro V100</title>

    <!-- 核心样式 -->
    <link rel="stylesheet" href="/static/css/style.css" />

    <script type="module" src="/static/js/app.js"></script>
    <!-- 第三方库 (Phase 1 归档位置) -->
    <script src="/static/lib/tailwindcss.js"></script>
    <script src="/static/lib/alpine-collapse.js"></script>
    <script src="/static/lib/alpine.js" defer></script>
    <script src="/static/lib/showdown.min.js"></script>
    <script src="/static/lib/marked.min.js"></script>
    <script src="/static/lib/purify.min.js"></script>
    <script src="/static/lib/diff.min.js"></script>
  </head>

  <!-- 全局状态绑定 -->
  <body
    x-data="layout"
    x-effect="document.documentElement.classList.toggle('light-mode', !isDarkMode)"
  >
    <div
      x-show="showPublicAuthWarning"
      x-cloak
      class="relative z-[10000] w-full bg-red-700 px-4 py-2 text-center text-sm font-semibold text-white shadow-lg"
    >
      公网部署未启用登录保护。请设置 STM_AUTH_USER / STM_AUTH_PASS 或在设置中配置外网访问账号密码。
    </div>

    <!-- 1. 全局 Loading 遮罩 -->
    {% include "components/loading.html" %}

    <!-- 2. 主内容插槽 -->
    {% block content %}{% endblock %}

    <!-- 3. 全局 Toast 通知 -->
    <div
      class="toast-notification"
      :class="{'show': showToastState}"
      x-text="toastMessage"
    ></div>
  </body>
</html>
