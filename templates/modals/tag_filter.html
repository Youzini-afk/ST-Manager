<!-- 标签筛选大模态框 -->
<div x-show="showTagFilterModal" x-data="tagFilterModal" x-cloak class="modal-overlay">
    <div class="tag-modal-container" @click.away="requestCloseModal()">
        <template x-if="$store.global.deviceType === 'mobile'">
        <div x-show="$store.global.deviceType === 'mobile'" class="tag-filter-mobile-shell">
            <div class="tag-filter-mobile-topbar">
                <div>
                    <div class="text-xs" style="color: var(--text-dim);">移动端标签工具</div>
                    <div style="font-size: 1rem; font-weight: 700;">标签库筛选</div>
                </div>
                <button @click="requestCloseModal()"
                    style="color: var(--text-dim); font-size: 1.25rem; background: none; border: none; cursor: pointer;">✕</button>
            </div>
            <div class="tag-filter-mobile-tabs" role="tablist" aria-label="标签筛选模式切换">
                <button type="button" role="tab" @click="switchMobileTagTab('filter')"
                    :aria-selected="mobileActiveTab === 'filter'">筛选</button>
                <button type="button" role="tab" @click="switchMobileTagTab('sort')"
                    :aria-selected="mobileActiveTab === 'sort'">排序</button>
                <button type="button" role="tab" @click="switchMobileTagTab('delete')"
                    :aria-selected="mobileActiveTab === 'delete'">删除</button>
                <button type="button" role="tab" @click="switchMobileTagTab('category')"
                    :aria-selected="mobileActiveTab === 'category'">分类</button>
            </div>
            <div class="tag-filter-mobile-utility">
                <div x-show="$store.global.deviceType === 'mobile' && mobileActiveTab === 'filter'"
                    class="tag-filter-mobile-panel tag-filter-mobile-panel--filter">
                    <input type="text" x-model="tagSearchQuery" placeholder="搜索标签..." class="form-input" :disabled="isSortMode"
                        :style="isSortMode ? 'padding: 0.75rem; font-size: 1rem; opacity: 0.6; cursor: not-allowed;' : 'padding: 0.75rem; font-size: 1rem;'">
                    <div x-show="!isSortMode" class="tag-category-filter-row">
                        <button type="button" class="tag-category-filter-pill"
                            :class="isCategoryFilterAllMixed ? 'active-mixed' : ''"
                            @click="showAllCategoriesMixed()"
                            title="显示全部分类（混合显示）">
                            全部（混合）
                        </button>
                        <template x-for="name in filterCategoryNames" :key="'m-fcat-' + name">
                            <button type="button" class="tag-category-filter-pill"
                                :class="{
                                    'active-included': getCategoryFilterState(name) === 'included',
                                    'active-excluded': getCategoryFilterState(name) === 'excluded'
                                }"
                                :style="`--tag-cat-color:${getCategoryColor(name)};`"
                                @click="toggleCategoryFilter(name, $event)">
                                <span class="tag-category-filter-dot"></span>
                                <span x-text="name"></span>
                            </button>
                        </template>
                    </div>
                </div>
                <div x-show="$store.global.deviceType === 'mobile' && mobileActiveTab === 'delete'"
                    class="tag-filter-mobile-panel tag-filter-mobile-panel--delete">
                    <div class="text-xs" style="color: var(--text-dim);">
                        已选择 <span class="text-accent font-bold" x-text="selectedTagsForDeletion.length"></span> 个待删除标签
                    </div>
                </div>
                <div x-show="$store.global.deviceType === 'mobile' && mobileActiveTab === 'sort'"
                    class="tag-filter-mobile-panel tag-filter-mobile-panel--sort">
                    <div class="text-xs" style="color: var(--text-dim);">
                        使用上下按钮调整顺序，保存后将同步到全局标签库。
                    </div>
                </div>
                <div x-show="$store.global.deviceType === 'mobile' && mobileActiveTab === 'category'"
                    class="tag-filter-mobile-panel tag-filter-mobile-panel--category">
                    <div class="tag-category-editor-row">
                        <span class="text-xs" style="color: var(--text-dim);">已选择 <span class="text-accent font-bold"
                                x-text="categorySelectionCount"></span> 个标签</span>
                        <button type="button" @click="selectedCategoryTags=[]" class="tag-category-clear">清空选择</button>
                    </div>
                    <div class="tag-category-editor-row tag-category-editor-row-main">
                        <input type="text" x-model="categoryDraftName" placeholder="分类名称（例如：角色 / 题材）" class="form-input"
                            style="font-size: 0.82rem; padding: 0.45rem 0.6rem;">
                        <input type="color" x-model="categoryDraftColor" class="tag-category-color-input" title="分类颜色">
                        <div class="tag-opacity-control" title="分类透明度（0-100）">
                            <span class="tag-opacity-label">透明度</span>
                            <input type="range" min="0" max="100" step="1" x-model.number="categoryDraftOpacity"
                                class="tag-opacity-slider">
                            <input type="number" min="0" max="100" step="1" x-model.number="categoryDraftOpacity"
                                class="tag-opacity-number">
                        </div>
                        <button type="button" @click="saveCategoryBatch()" :disabled="!canSaveCategoryBatch"
                            class="text-xs bg-green-700 hover:bg-green-600 px-3 py-1 rounded text-white font-bold shadow-md"
                            :style="canSaveCategoryBatch ? '' : 'opacity: 0.55; cursor: not-allowed;'">
                            保存分类
                        </button>
                    </div>
                    <div class="tag-category-quick-list">
                        <template x-for="name in availableCategoryNames" :key="'mobile-cat-opt-' + name">
                            <button type="button" class="tag-category-quick-btn" @click="setCategoryDraft(name)"
                                :class="categoryDraftName === name ? 'active' : ''"
                                :style="`--tag-cat-color:${getCategoryColor(name)};`">
                                <span class="tag-category-quick-dot"></span>
                                <span x-text="name"></span>
                                <span class="tag-category-quick-opacity" x-text="getCategoryOpacity(name) + '%'" title="当前透明度"></span>
                            </button>
                        </template>
                    </div>
                    <button type="button" @click="toggleCategoryManager()"
                        class="text-xs bg-blue-700 hover:bg-blue-600 px-3 py-1 rounded text-white font-bold shadow-md"
                        x-text="showCategoryManager ? '收起分类管理' : '分类管理'"></button>
                    <div x-show="$store.global.deviceType === 'mobile' && showCategoryManager && mobileActiveTab === 'category'"
                        class="tag-filter-mobile-category-manager">
                        <div class="tag-category-editor-row tag-category-editor-row-main">
                            <input type="text" x-model="categoryManagerDraftName" placeholder="新增分类名称" class="form-input"
                                style="font-size: 0.82rem; padding: 0.42rem 0.6rem;">
                            <input type="color" x-model="categoryManagerDraftColor" class="tag-category-color-input" title="分类颜色">
                            <div class="tag-opacity-control" title="分类透明度（0-100）">
                                <span class="tag-opacity-label">透明度</span>
                                <input type="range" min="0" max="100" step="1" x-model.number="categoryManagerDraftOpacity"
                                    class="tag-opacity-slider">
                                <input type="number" min="0" max="100" step="1" x-model.number="categoryManagerDraftOpacity"
                                    class="tag-opacity-number">
                            </div>
                            <button type="button" @click="addCategoryFromManager()"
                                class="text-xs bg-blue-700 hover:bg-blue-600 px-3 py-1 rounded text-white font-bold shadow-md">
                                新增/更新
                            </button>
                        </div>
                        <div class="tag-category-manager-list custom-scrollbar">
                            <template x-for="item in categoryManagerItems" :key="'mobile-mgr-' + item.name">
                                <div class="tag-category-manager-item">
                                    <div class="tag-category-manager-main">
                                        <span class="tag-category-manager-dot" :style="`background:${item.color};`"></span>
                                        <span class="tag-category-manager-name" x-text="item.name"></span>
                                        <span class="tag-category-manager-opacity-pill" x-text="item.opacity + '%'" title="当前透明度"></span>
                                        <span x-show="item.isDefault" class="tag-category-manager-default">默认</span>
                                        <span class="tag-category-manager-count" x-text="item.count + ' 个标签'"></span>
                                    </div>
                                    <div class="tag-category-manager-actions">
                                        <input type="color" :value="item.color" class="tag-category-manager-color"
                                            @change="setCategoryColor(item.name, $event.target.value)" title="修改分类颜色">
                                        <div class="tag-category-manager-opacity-wrap" title="修改分类不透明度（0-100）">
                                            <input type="range" min="0" max="100" step="1" :value="getCategoryOpacity(item.name)"
                                                @change="setCategoryOpacity(item.name, $event.target.value)"
                                                class="tag-category-manager-opacity-slider">
                                            <span class="tag-category-manager-opacity-text" x-text="getCategoryOpacity(item.name)"></span>
                                        </div>
                                        <button type="button" class="tag-category-manager-btn" @click="setDefaultCategory(item.name)"
                                            :disabled="item.isDefault"
                                            :style="item.isDefault ? 'opacity:0.45; cursor:not-allowed;' : ''">设为默认</button>
                                        <button type="button" class="tag-category-manager-btn" @click="moveCategory(item.name, -1)"
                                            :disabled="item.index===0"
                                            :style="item.index===0 ? 'opacity:0.45; cursor:not-allowed;' : ''">上移</button>
                                        <button type="button" class="tag-category-manager-btn" @click="moveCategory(item.name, 1)"
                                            :disabled="item.index===categoryManagerItems.length-1"
                                            :style="item.index===categoryManagerItems.length-1 ? 'opacity:0.45; cursor:not-allowed;' : ''">下移</button>
                                        <button type="button" class="tag-category-manager-btn" @click="renameCategory(item.name)">重命名</button>
                                        <button type="button" class="tag-category-manager-btn danger" @click="deleteCategory(item.name)"
                                            :disabled="item.isDefault"
                                            :style="item.isDefault ? 'opacity:0.45; cursor:not-allowed;' : ''">删除</button>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>
            </div>
            <div class="tag-filter-mobile-main custom-scrollbar">
                <div x-show="$store.global.deviceType === 'mobile' && mobileActiveTab === 'sort'">
                    <template x-if="isSortMode">
                        <div>
                            <template x-for="tag in sortModeTagsPool" :key="'m-sort-' + tag">
                                <div class="tag-filter-mobile-sort-row">
                                    <span class="tag-chip-drag-handle">☰</span>
                                    <span x-text="tag" style="flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;"></span>
                                    <button type="button" @click="moveSortTagUp(tag)">上移</button>
                                    <button type="button" @click="moveSortTagDown(tag)">下移</button>
                                </div>
                            </template>
                        </div>
                    </template>
                </div>
                <div x-show="$store.global.deviceType === 'mobile' && mobileActiveTab !== 'sort'" class="tag-cloud-container custom-scrollbar">
                    <template x-if="!isSortMode">
                        <div class="tag-cloud-mode-wrap">
                            <template x-if="mixedCategoryView">
                                <template x-for="tag in filteredMixedTagsPool" :key="'mobile-mixed-' + tag">
                                    <button
                                        @click="isDeleteMode ? toggleTagSelectionForDeletion(tag) : (showCategoryMode ? toggleTagSelectionForCategory(tag) : toggleFilterTag(tag, $event))"
                                        class="tag-chip-btn flex items-center" :class="{
                                                'tag-chip-selected': !isDeleteMode && !showCategoryMode && filterTags.includes(tag),
                                                'tag-chip-excluded': !isDeleteMode && !showCategoryMode && $store.global.viewState.excludedTags.includes(tag),
                                                'tag-chip-unselected tag-chip-categorized': !isDeleteMode && !showCategoryMode && !filterTags.includes(tag) && !$store.global.viewState.excludedTags.includes(tag),
                                                'tag-chip-delete-selected': isDeleteMode && selectedTagsForDeletion.includes(tag),
                                                'tag-chip-delete-unselected': isDeleteMode && !selectedTagsForDeletion.includes(tag),
                                                'tag-chip-category-selected': showCategoryMode && selectedCategoryTags.includes(tag),
                                                'tag-chip-category-unselected tag-chip-categorized': showCategoryMode && !selectedCategoryTags.includes(tag)
                                            }"
                                        :style="(!isDeleteMode && (($store.global.viewState.filterTags || []).indexOf(tag) === -1) && (($store.global.viewState.excludedTags || []).indexOf(tag) === -1)) ? getTagChipStyle(tag) : ''"
                                        :title="!isDeleteMode && !showCategoryMode ? (filterTags.includes(tag) ? `标签：${tag}（已包含，点击改为排除）` : ($store.global.viewState.excludedTags.includes(tag) ? `标签：${tag}（已排除，点击取消筛选）` : `标签：${tag}（分类：${getTagCategory(tag)}，点击加入筛选，Shift+点击可直接排除）`)) : (showCategoryMode ? `标签：${tag}（当前分类：${getTagCategory(tag)}）` : '')">
                                        <span x-show="isDeleteMode && selectedTagsForDeletion.includes(tag)" class="mr-1 font-bold">✓</span>
                                        <span x-show="showCategoryMode && selectedCategoryTags.includes(tag)" class="mr-1 font-bold">✓</span>
                                        <span class="tag-chip-label" x-text="tag" style="overflow: hidden; text-overflow: ellipsis; white-space: nowrap;"></span>
                                    </button>
                                </template>
                            </template>
                            <template x-if="!mixedCategoryView">
                                <template x-for="group in filteredTagGroups" :key="'mobile-group-' + group.category">
                                    <div class="tag-group-block">
                                        <div class="tag-group-head">
                                            <span class="tag-group-dot" :style="`background:${group.color};`"></span>
                                            <span class="tag-group-title" x-text="group.category"></span>
                                            <span class="tag-group-count" x-text="group.tags.length + ' 个'"></span>
                                        </div>
                                        <div class="tag-group-cloud">
                                            <template x-for="tag in group.tags" :key="'mobile-tag-' + tag">
                                                <button
                                                    @click="isDeleteMode ? toggleTagSelectionForDeletion(tag) : (showCategoryMode ? toggleTagSelectionForCategory(tag) : toggleFilterTag(tag, $event))"
                                                    class="tag-chip-btn flex items-center" :class="{
                                                            'tag-chip-selected': !isDeleteMode && !showCategoryMode && filterTags.includes(tag),
                                                            'tag-chip-excluded': !isDeleteMode && !showCategoryMode && $store.global.viewState.excludedTags.includes(tag),
                                                            'tag-chip-unselected tag-chip-categorized': !isDeleteMode && !showCategoryMode && !filterTags.includes(tag) && !$store.global.viewState.excludedTags.includes(tag),
                                                            'tag-chip-delete-selected': isDeleteMode && selectedTagsForDeletion.includes(tag),
                                                            'tag-chip-delete-unselected': isDeleteMode && !selectedTagsForDeletion.includes(tag),
                                                            'tag-chip-category-selected': showCategoryMode && selectedCategoryTags.includes(tag),
                                                            'tag-chip-category-unselected tag-chip-categorized': showCategoryMode && !selectedCategoryTags.includes(tag)
                                                        }"
                                                    :style="(!isDeleteMode && (($store.global.viewState.filterTags || []).indexOf(tag) === -1) && (($store.global.viewState.excludedTags || []).indexOf(tag) === -1)) ? getTagChipStyle(tag) : ''"
                                                    :title="!isDeleteMode && !showCategoryMode ? (filterTags.includes(tag) ? `标签：${tag}（已包含，点击改为排除）` : ($store.global.viewState.excludedTags.includes(tag) ? `标签：${tag}（已排除，点击取消筛选）` : `标签：${tag}（分类：${getTagCategory(tag)}，点击加入筛选，Shift+点击可直接排除）`)) : (showCategoryMode ? `标签：${tag}（当前分类：${getTagCategory(tag)}）` : '')">
                                                    <span x-show="isDeleteMode && selectedTagsForDeletion.includes(tag)" class="mr-1 font-bold">✓</span>
                                                    <span x-show="showCategoryMode && selectedCategoryTags.includes(tag)" class="mr-1 font-bold">✓</span>
                                                    <span class="tag-chip-label" x-text="tag" style="overflow: hidden; text-overflow: ellipsis; white-space: nowrap;"></span>
                                                </button>
                                            </template>
                                        </div>
                                    </div>
                                </template>
                            </template>
                        </div>
                    </template>
                    <div x-show="!isSortMode && filteredVisibleTagCount === 0"
                        style="width: 100%; text-align: center; color: var(--text-dim); margin-top: 2rem;">无匹配标签</div>
                </div>
            </div>
            <div class="tag-filter-mobile-bottombar">
                <span x-show="mobileActiveTab === 'filter'">筛选面板</span>
                <span x-show="mobileActiveTab === 'sort'">排序面板</span>
                <span x-show="mobileActiveTab === 'delete'">删除面板</span>
                <span x-show="mobileActiveTab === 'category'">分类面板</span>
                <button type="button" x-show="mobileActiveTab === 'sort' && isSortMode" @click="saveSortMode()">
                    保存排序
                </button>
            </div>
        </div>
        </template>
        <template x-if="$store.global.deviceType !== 'mobile'">
        <div x-show="$store.global.deviceType !== 'mobile'" class="tag-filter-desktop-shell">
            <div class="tag-filter-desktop-toolbar"
                style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; border-bottom: 1px solid var(--border-light); padding-bottom: 1rem;">
                <div class="flex items-center gap-4">
                    <h3 style="font-size: 1.25rem; font-weight: bold;">
                        <span x-show="!isDeleteMode && !showCategoryMode">标签库筛选</span>
                        <span x-show="showCategoryMode && !isDeleteMode" class="text-amber-300">批量分类标签</span>
                        <span x-show="isDeleteMode" class="text-red-400">永久删除标签</span>
                    </h3>
                    <span x-show="!isDeleteMode" class="text-xs px-2 py-1 rounded-full"
                        :style="customOrderEnabled ? 'background: color-mix(in srgb, var(--accent-main), transparent 82%); color: var(--accent-light); border: 1px solid color-mix(in srgb, var(--accent-main), transparent 50%);' : 'background: var(--bg-sub); color: var(--text-dim); border: 1px solid var(--border-light);'"
                        x-text="customOrderEnabled ? '当前：自定义排序' : '当前：字符排序'"></span>
                </div>
                <button @click="requestCloseModal()"
                    style="color: var(--text-dim); font-size: 1.5rem; background: none; border: none; cursor: pointer;">✕</button>
            </div>
            <div class="tag-filter-desktop-workbench">
                <div class="tag-filter-desktop-sidebar">
                    <button @click="toggleSortMode()" class="btn-toggle-delete"
                        :class="isSortMode ? 'btn-toggle-mode-delete' : 'btn-toggle-mode-normal'">
                        <span x-show="!isSortMode">↕ 排序模式</span>
                        <span x-show="isSortMode">↩ 取消排序</span>
                    </button>
                    <button @click="clearCustomOrder()" class="btn-toggle-delete btn-toggle-mode-normal"
                        x-show="customOrderEnabled">
                        🔄 恢复字符排序
                    </button>
                    <button @click="toggleDeleteMode()" class="btn-toggle-delete"
                        :class="isDeleteMode ? 'btn-toggle-mode-delete' : 'btn-toggle-mode-normal'">
                        <span x-show="!isDeleteMode">🗑️ 切换到删除模式</span>
                        <span x-show="isDeleteMode">↩ 返回筛选模式</span>
                    </button>
                    <button @click="toggleCategoryMode()" class="btn-toggle-delete"
                        :class="showCategoryMode ? 'btn-toggle-mode-delete' : 'btn-toggle-mode-normal'">
                        <span x-show="!showCategoryMode">🎨 批量分类模式</span>
                        <span x-show="showCategoryMode">↩ 返回筛选模式</span>
                    </button>
                    <label class="text-xs" style="display:flex; align-items:center; gap:0.5rem; color: var(--text-dim); margin-top: 0.75rem;">
                        <input type="checkbox" x-model="rememberLastTagView" @change="saveDesktopWorkbenchPrefs()">
                        记住上次标签视图
                    </label>
                    <label class="text-xs" style="display:flex; align-items:center; gap:0.5rem; color: var(--text-dim); margin-top: 0.5rem;">
                        <input type="checkbox" x-model="lockTagLibrary" @change="saveTagManagementPrefsState()">
                        锁定标签库治理
                    </label>
                    <div class="text-xs" style="margin-top: 0.5rem; color: var(--text-dim);">标签黑名单</div>
                    <textarea x-model="tagBlacklistInput" @change="saveTagManagementPrefsState()" @blur="saveTagManagementPrefsState()"
                        class="form-input" rows="4" placeholder="输入黑名单标签，使用逗号或换行分隔"
                        style="margin-top: 0.25rem; min-height: 7rem; resize: vertical;"></textarea>
                </div>
                <div class="tag-filter-desktop-main">
                    <input type="text" x-model="tagSearchQuery" placeholder="搜索标签..." class="form-input" :disabled="isSortMode"
                        :style="isSortMode ? 'margin-bottom: 1rem; padding: 0.75rem; font-size: 1rem; opacity: 0.6; cursor: not-allowed;' : 'margin-bottom: 1rem; padding: 0.75rem; font-size: 1rem;'">
                    <div x-show="$store.global.deviceType !== 'mobile' && isSortMode" class="text-xs mb-2" style="color: var(--text-dim);">
                        排序模式仅针对完整标签库生效，侧栏分类标签池将自动继承此全局顺序。
                    </div>
                    <div x-show="$store.global.deviceType !== 'mobile' && customOrderEnabled && !isSortMode" class="text-xs mb-2" style="color: var(--text-dim);">
                        当前使用自定义排序，可点击“恢复字符排序”回退到原始字母序。
                    </div>
                    <div x-show="$store.global.deviceType !== 'mobile' && !isSortMode" class="tag-category-filter-row">
                        <button type="button" class="tag-category-filter-pill"
                            :class="isCategoryFilterAllMixed ? 'active-mixed' : ''"
                            @click="showAllCategoriesMixed()"
                            title="显示全部分类（混合显示）">
                            全部（混合）
                        </button>
                        <template x-for="name in filterCategoryNames" :key="'fcat-' + name">
                            <button type="button" class="tag-category-filter-pill"
                                :class="{
                                    'active-included': getCategoryFilterState(name) === 'included',
                                    'active-excluded': getCategoryFilterState(name) === 'excluded'
                                }"
                                :style="`--tag-cat-color:${getCategoryColor(name)};`"
                                @click="toggleCategoryFilter(name, $event)"
                                :title="getCategoryFilterState(name) === 'included' ? `分类：${name}（已包含，点击改为排除）` : (getCategoryFilterState(name) === 'excluded' ? `分类：${name}（已排除，点击取消）` : `分类：${name}（点击包含，Shift+点击直接排除）`)">
                                <span class="tag-category-filter-dot"></span>
                                <span x-text="name"></span>
                            </button>
                        </template>
                    </div>
                    <div x-show="$store.global.deviceType !== 'mobile' && showCategoryMode && !isSortMode" class="tag-category-editor">
                        <div class="tag-category-editor-row">
                            <span class="text-xs" style="color: var(--text-dim);">已选择 <span class="text-accent font-bold"
                                    x-text="categorySelectionCount"></span> 个标签，点击标签可增减选择。</span>
                            <button type="button" @click="selectedCategoryTags=[]" class="tag-category-clear">清空选择</button>
                        </div>
                        <div class="tag-category-editor-row tag-category-editor-row-main">
                            <input type="text" x-model="categoryDraftName" placeholder="分类名称（例如：角色 / 题材）" class="form-input"
                                style="font-size: 0.82rem; padding: 0.45rem 0.6rem;">
                            <input type="color" x-model="categoryDraftColor" class="tag-category-color-input" title="分类颜色">
                            <div class="tag-opacity-control" title="分类透明度（0-100）">
                                <span class="tag-opacity-label">透明度</span>
                                <input type="range" min="0" max="100" step="1" x-model.number="categoryDraftOpacity"
                                    class="tag-opacity-slider">
                                <input type="number" min="0" max="100" step="1" x-model.number="categoryDraftOpacity"
                                    class="tag-opacity-number">
                            </div>
                            <button type="button" @click="saveCategoryBatch()" :disabled="!canSaveCategoryBatch"
                                class="text-xs bg-green-700 hover:bg-green-600 px-3 py-1 rounded text-white font-bold shadow-md"
                                :style="canSaveCategoryBatch ? '' : 'opacity: 0.55; cursor: not-allowed;'">
                                保存分类
                            </button>
                        </div>
                        <div class="tag-category-quick-list">
                            <template x-for="name in availableCategoryNames" :key="'cat-opt-' + name">
                                <button type="button" class="tag-category-quick-btn" @click="setCategoryDraft(name)"
                                    :class="categoryDraftName === name ? 'active' : ''"
                                    :style="`--tag-cat-color:${getCategoryColor(name)};`">
                                    <span class="tag-category-quick-dot"></span>
                                    <span x-text="name"></span>
                                    <span class="tag-category-quick-opacity" x-text="getCategoryOpacity(name) + '%'" title="当前透明度"></span>
                                </button>
                            </template>
                        </div>
                    </div>
                    <div x-show="$store.global.deviceType !== 'mobile' && showCategoryManager && !isSortMode" class="tag-category-manager-panel">
                        <div class="tag-category-editor-row tag-category-editor-row-main">
                            <input type="text" x-model="categoryManagerDraftName" placeholder="新增分类名称" class="form-input"
                                style="font-size: 0.82rem; padding: 0.42rem 0.6rem;">
                            <input type="color" x-model="categoryManagerDraftColor" class="tag-category-color-input" title="分类颜色">
                            <div class="tag-opacity-control" title="分类透明度（0-100）">
                                <span class="tag-opacity-label">透明度</span>
                                <input type="range" min="0" max="100" step="1" x-model.number="categoryManagerDraftOpacity"
                                    class="tag-opacity-slider">
                                <input type="number" min="0" max="100" step="1" x-model.number="categoryManagerDraftOpacity"
                                    class="tag-opacity-number">
                            </div>
                            <button type="button" @click="addCategoryFromManager()"
                                class="text-xs bg-blue-700 hover:bg-blue-600 px-3 py-1 rounded text-white font-bold shadow-md">
                                新增/更新
                            </button>
                        </div>
                        <div class="tag-category-editor-row" style="align-items: flex-start; justify-content: space-between; gap: 1rem; margin-bottom: 0.75rem;">
                            <div style="flex: 0 0 16rem; max-width: 16rem;">
                                <div class="text-xs" style="color: var(--text-dim); margin-bottom: 0.35rem;">分类内排序</div>
                                <select x-model="selectedCategorySortName" @change="saveDesktopWorkbenchPrefs()" class="form-input" style="padding: 0.5rem 0.65rem;">
                                    <option value="">选择一个分类</option>
                                    <template x-for="name in availableCategoryNames" :key="'sort-cat-' + name">
                                        <option :value="name" x-text="name"></option>
                                    </template>
                                </select>
                            </div>
                            <div style="flex: 1; min-width: 0;">
                                <div class="tag-category-editor-row" style="justify-content: space-between; margin-bottom: 0.35rem;">
                                    <span class="text-xs" style="color: var(--text-dim);">仅对当前选中分类生效，保存后覆盖该分类的内部顺序。</span>
                                    <button type="button" class="tag-category-manager-btn" @click="resetSelectedCategoryTagOrder()"
                                        :disabled="!selectedCategorySortName"
                                        :style="!selectedCategorySortName ? 'opacity:0.45; cursor:not-allowed;' : ''">恢复全局顺序</button>
                                </div>
                                <div class="tag-category-manager-list custom-scrollbar" style="max-height: 10rem;">
                                    <template x-if="!selectedCategorySortName">
                                        <div class="text-xs" style="color: var(--text-dim); padding: 0.5rem 0;">选择分类后可在此调整内部标签顺序。</div>
                                    </template>
                                    <template x-if="selectedCategorySortName && selectedCategorySortTags.length === 0">
                                        <div class="text-xs" style="color: var(--text-dim); padding: 0.5rem 0;">当前分类暂无可排序标签。</div>
                                    </template>
                                    <template x-for="(tag, index) in selectedCategorySortTags" :key="'sort-tag-' + selectedCategorySortName + '-' + tag">
                                        <div class="tag-category-manager-item">
                                            <div class="tag-category-manager-main">
                                                <span class="tag-category-manager-name" x-text="tag"></span>
                                            </div>
                                            <div class="tag-category-manager-actions">
                                                <button type="button" class="tag-category-manager-btn" @click="moveSelectedCategoryTagUp(tag)"
                                                    :disabled="index===0"
                                                    :style="index===0 ? 'opacity:0.45; cursor:not-allowed;' : ''">上移</button>
                                                <button type="button" class="tag-category-manager-btn" @click="moveSelectedCategoryTagDown(tag)"
                                                    :disabled="index===selectedCategorySortTags.length-1"
                                                    :style="index===selectedCategorySortTags.length-1 ? 'opacity:0.45; cursor:not-allowed;' : ''">下移</button>
                                            </div>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </div>
                        <div class="tag-category-manager-list custom-scrollbar">
                            <template x-for="item in categoryManagerItems" :key="'mgr-' + item.name">
                                <div class="tag-category-manager-item">
                                    <div class="tag-category-manager-main">
                                        <span class="tag-category-manager-dot" :style="`background:${item.color};`"></span>
                                        <span class="tag-category-manager-name" x-text="item.name"></span>
                                        <span class="tag-category-manager-opacity-pill" x-text="item.opacity + '%'" title="当前透明度"></span>
                                        <span x-show="item.isDefault" class="tag-category-manager-default">默认</span>
                                        <span class="tag-category-manager-count" x-text="item.count + ' 个标签'"></span>
                                    </div>
                                    <div class="tag-category-manager-actions">
                                        <input type="color" :value="item.color" class="tag-category-manager-color"
                                            @change="setCategoryColor(item.name, $event.target.value)" title="修改分类颜色">
                                        <div class="tag-category-manager-opacity-wrap" title="修改分类不透明度（0-100）">
                                            <input type="range" min="0" max="100" step="1" :value="getCategoryOpacity(item.name)"
                                                @change="setCategoryOpacity(item.name, $event.target.value)"
                                                class="tag-category-manager-opacity-slider">
                                            <span class="tag-category-manager-opacity-text" x-text="getCategoryOpacity(item.name)"></span>
                                        </div>
                                        <button type="button" class="tag-category-manager-btn" @click="setDefaultCategory(item.name)"
                                            :disabled="item.isDefault"
                                            :style="item.isDefault ? 'opacity:0.45; cursor:not-allowed;' : ''">设为默认</button>
                                        <button type="button" class="tag-category-manager-btn" @click="moveCategory(item.name, -1)"
                                            :disabled="item.index===0"
                                            :style="item.index===0 ? 'opacity:0.45; cursor:not-allowed;' : ''">上移</button>
                                        <button type="button" class="tag-category-manager-btn" @click="moveCategory(item.name, 1)"
                                            :disabled="item.index===categoryManagerItems.length-1"
                                            :style="item.index===categoryManagerItems.length-1 ? 'opacity:0.45; cursor:not-allowed;' : ''">下移</button>
                                        <button type="button" class="tag-category-manager-btn" @click="renameCategory(item.name)">重命名</button>
                                        <button type="button" class="tag-category-manager-btn danger" @click="deleteCategory(item.name)"
                                            :disabled="item.isDefault"
                                            :style="item.isDefault ? 'opacity:0.45; cursor:not-allowed;' : ''">删除</button>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        </template>
        <div x-show="$store.global.deviceType !== 'mobile'" class="tag-cloud-container custom-scrollbar">
            <template x-if="!isSortMode">
                <div class="tag-cloud-mode-wrap">
                    <template x-if="mixedCategoryView">
                        <template x-for="tag in filteredMixedTagsPool" :key="'mixed-' + tag">
                            <button
                                @click="isDeleteMode ? toggleTagSelectionForDeletion(tag) : (showCategoryMode ? toggleTagSelectionForCategory(tag) : toggleFilterTag(tag, $event))"
                                class="tag-chip-btn flex items-center" :class="{
                                        'tag-chip-selected': !isDeleteMode && !showCategoryMode && filterTags.includes(tag),
                                        'tag-chip-excluded': !isDeleteMode && !showCategoryMode && $store.global.viewState.excludedTags.includes(tag),
                                        'tag-chip-unselected tag-chip-categorized': !isDeleteMode && !showCategoryMode && !filterTags.includes(tag) && !$store.global.viewState.excludedTags.includes(tag),
                                        'tag-chip-delete-selected': isDeleteMode && selectedTagsForDeletion.includes(tag),
                                        'tag-chip-delete-unselected': isDeleteMode && !selectedTagsForDeletion.includes(tag),
                                        'tag-chip-category-selected': showCategoryMode && selectedCategoryTags.includes(tag),
                                        'tag-chip-category-unselected tag-chip-categorized': showCategoryMode && !selectedCategoryTags.includes(tag)
                                    }"
                                :style="(!isDeleteMode && (($store.global.viewState.filterTags || []).indexOf(tag) === -1) && (($store.global.viewState.excludedTags || []).indexOf(tag) === -1)) ? getTagChipStyle(tag) : ''"
                                :title="!isDeleteMode && !showCategoryMode ? (filterTags.includes(tag) ? `标签：${tag}（已包含，点击改为排除）` : ($store.global.viewState.excludedTags.includes(tag) ? `标签：${tag}（已排除，点击取消筛选）` : `标签：${tag}（分类：${getTagCategory(tag)}，点击加入筛选，Shift+点击可直接排除）`)) : (showCategoryMode ? `标签：${tag}（当前分类：${getTagCategory(tag)}）` : '')">
                                <span x-show="isDeleteMode && selectedTagsForDeletion.includes(tag)" class="mr-1 font-bold">✓</span>
                                <span x-show="showCategoryMode && selectedCategoryTags.includes(tag)" class="mr-1 font-bold">✓</span>
                                <span class="tag-chip-label" x-text="tag" style="overflow: hidden; text-overflow: ellipsis; white-space: nowrap;"></span>
                            </button>
                        </template>
                    </template>
                    <template x-if="!mixedCategoryView">
                        <template x-for="group in filteredTagGroups" :key="'group-' + group.category">
                            <div class="tag-group-block">
                                <div class="tag-group-head">
                                    <span class="tag-group-dot" :style="`background:${group.color};`"></span>
                                    <span class="tag-group-title" x-text="group.category"></span>
                                    <span class="tag-group-count" x-text="group.tags.length + ' 个'"></span>
                                </div>
                                <div class="tag-group-cloud">
                                    <template x-for="tag in group.tags" :key="tag">
                                        <button
                                            @click="isDeleteMode ? toggleTagSelectionForDeletion(tag) : (showCategoryMode ? toggleTagSelectionForCategory(tag) : toggleFilterTag(tag, $event))"
                                            class="tag-chip-btn flex items-center" :class="{
                                                    'tag-chip-selected': !isDeleteMode && !showCategoryMode && filterTags.includes(tag),
                                                    'tag-chip-excluded': !isDeleteMode && !showCategoryMode && $store.global.viewState.excludedTags.includes(tag),
                                                    'tag-chip-unselected tag-chip-categorized': !isDeleteMode && !showCategoryMode && !filterTags.includes(tag) && !$store.global.viewState.excludedTags.includes(tag),
                                                    'tag-chip-delete-selected': isDeleteMode && selectedTagsForDeletion.includes(tag),
                                                    'tag-chip-delete-unselected': isDeleteMode && !selectedTagsForDeletion.includes(tag),
                                                    'tag-chip-category-selected': showCategoryMode && selectedCategoryTags.includes(tag),
                                                    'tag-chip-category-unselected tag-chip-categorized': showCategoryMode && !selectedCategoryTags.includes(tag)
                                                }"
                                            :style="(!isDeleteMode && (($store.global.viewState.filterTags || []).indexOf(tag) === -1) && (($store.global.viewState.excludedTags || []).indexOf(tag) === -1)) ? getTagChipStyle(tag) : ''"
                                            :title="!isDeleteMode && !showCategoryMode ? (filterTags.includes(tag) ? `标签：${tag}（已包含，点击改为排除）` : ($store.global.viewState.excludedTags.includes(tag) ? `标签：${tag}（已排除，点击取消筛选）` : `标签：${tag}（分类：${getTagCategory(tag)}，点击加入筛选，Shift+点击可直接排除）`)) : (showCategoryMode ? `标签：${tag}（当前分类：${getTagCategory(tag)}）` : '')">
                                            <span x-show="isDeleteMode && selectedTagsForDeletion.includes(tag)" class="mr-1 font-bold">✓</span>
                                            <span x-show="showCategoryMode && selectedCategoryTags.includes(tag)" class="mr-1 font-bold">✓</span>
                                            <span class="tag-chip-label" x-text="tag" style="overflow: hidden; text-overflow: ellipsis; white-space: nowrap;"></span>
                                        </button>
                                    </template>
                                </div>
                            </div>
                        </template>
                    </template>
                </div>
            </template>

            <template x-if="$store.global.deviceType !== 'mobile' && isSortMode">
                <template x-for="tag in sortModeTagsPool" :key="tag">
                    <button
                        class="tag-chip-btn flex items-center tag-chip-sortable"
                        :class="dragOverTag === tag ? 'tag-chip-sort-over' : 'tag-chip-unselected'"
                        draggable="true"
                        @dragstart="onSortDragStart($event, tag)"
                        @dragover="onSortDragOver($event, tag)"
                        @drop="onSortDrop($event, tag)"
                        @dragend="onSortDragEnd()">
                        <span class="tag-chip-drag-handle">☰</span>
                        <span x-text="tag" style="overflow: hidden; text-overflow: ellipsis; white-space: nowrap;"></span>
                    </button>
                </template>
            </template>
            <div x-show="!isSortMode && filteredVisibleTagCount === 0"
                style="width: 100%; text-align: center; color: var(--text-dim); margin-top: 2rem;">无匹配标签</div>
            <div x-show="isSortMode && sortModeTagsPool.length === 0"
                style="width: 100%; text-align: center; color: var(--text-dim); margin-top: 2rem;">暂无可排序标签</div>
        </div>
        <div x-show="$store.global.deviceType !== 'mobile'"
            style="margin-top: 1rem; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border-light); padding-top: 1rem;">
            <div class="flex items-center gap-4">
                <span class="text-sm" style="color: var(--text-dim);">已选 <span x-text="filterTags.length + $store.global.viewState.excludedTags.length"
                        class="text-accent font-bold"></span> 个标签</span>
                <button @click="deleteFilterTags()" x-show="(filterTags.length > 0 || $store.global.viewState.excludedTags.length > 0) && !isDeleteMode && !isSortMode && !showCategoryMode"
                    class="text-xs bg-red-600 hover:bg-red-500 px-2 py-1 rounded text-white">
                    从当前视图移除选中标签
                </button>
            </div>
            <div class="flex gap-2">
                <button @click="saveSortMode()" x-show="isSortMode"
                    class="text-xs bg-green-700 hover:bg-green-600 px-3 py-1 rounded text-white font-bold shadow-md">
                    保存排序
                </button>
                <button @click="toggleCategoryManager()" x-show="!isSortMode"
                    class="text-xs bg-blue-700 hover:bg-blue-600 px-3 py-1 rounded text-white font-bold shadow-md"
                    x-text="showCategoryManager ? '收起分类管理' : '分类管理'"></button>
                <button @click="deleteSelectedTags()" x-show="isDeleteMode && selectedTagsForDeletion.length > 0"
                    class="text-xs bg-red-700 hover:bg-red-600 px-3 py-1 rounded text-white font-bold shadow-md">
                    永久删除选中标签
                </button>
                <button @click="filterTags=[]; $store.global.viewState.excludedTags=[]" x-show="!isSortMode && !showCategoryMode"
                    style="color: #f87171; background: none; border: none; cursor: pointer; font-size: 0.875rem;">清除所有选择</button>
            </div>
        </div>
    </div>
</div>
