<!-- 高级功能编辑器 (Regex & Scripts) -->
<div x-show="showAdvancedModal" x-data="advancedEditor" x-cloak class="modal-overlay z-modal-popover"
    @click.self="requestClose()">
    <div class="modal-container advanced-editor-container"
        style="width: 1200px; height: 90vh; flex-direction: column; border: 1px solid var(--border-light);">

        <!-- 1. 顶部 Header -->
        <div class="p-4 border-b flex justify-between items-center advanced-editor-header"
            style="background: var(--bg-sub); border-color: var(--border-light);">
            <div class="flex items-center gap-3">
                <h3 class="font-bold text-lg advanced-editor-title" style="color: var(--text-main);">🛠️ 高级扩展</h3>
                <span class="text-xs px-2 py-0.5 rounded border border-gray-600 text-gray-400 hidden md:inline"
                    x-text="isFileMode ? (fileType === 'regex' ? '单文件编辑: Regex' : '单文件编辑: Script') : 'Regex & Scripts'">
                </span>
            </div>
            <button @click="requestClose()"
                class="text-gray-400 hover:text-red-500 transition text-xl advanced-editor-close-btn">✕</button>
        </div>

        <!-- 2. 顶部 Tabs -->
        <div class="adv-tab-bar" x-show="!isFileMode">
            <div @click="activeTab='regex'" class="adv-tab" :class="activeTab==='regex'?'active':''">
                <span class="tab-icon">🧩</span> <span class="tab-text">正则脚本 (Regex)</span>
            </div>
            <div @click="activeTab='scripts'" class="adv-tab" :class="activeTab==='scripts'?'active':''">
                <span class="tab-icon">📜</span> <span class="tab-text">ST 脚本 (Helper)</span>
            </div>
        </div>
        <div class="adv-tab-bar" x-show="isFileMode"
            style="background: var(--bg-sub); border-bottom: 1px solid var(--border-light); cursor: default;">
            <div class="adv-tab active" style="border-bottom-color: var(--accent-main); color: var(--accent-main);">
                <span class="tab-icon" x-text="{
                    'regex': '🧩',
                    'script': '📜',
                    'quick_reply': '⚡'
                }[fileType] || '📄'"></span>
                <span class="tab-text"
                    x-text="currentFilePath ? currentFilePath.split('/').pop() : 'Editing File'"></span>
            </div>
        </div>

        <!-- 3. 主体内容区 (已移除 x-data，使用父级状态) -->
        <div class="flex-1 overflow-hidden relative">

            <!-- === Tab 1: Regex (Split View) === -->
            <div x-show="activeTab==='regex'" class="adv-split-view">

                <!-- 左侧：正则列表 -->
                <div class="adv-list-pane custom-scrollbar overflow-y-auto" :class="{
                        'hidden md:flex': $store.global.deviceType !== 'mobile',
                        'top-14': $store.global.deviceType !== 'mobile',
                        'top-0': $store.global.deviceType === 'mobile',
                        'fixed left-0 bottom-0 z-50 w-[280px] max-w-[85vw] shadow-2xl flex flex-col': $store.global.deviceType === 'mobile' && showMobileSidebar,
                        'hidden': $store.global.deviceType === 'mobile' && !showMobileSidebar
                    }" x-transition:enter="transition ease-out duration-300"
                    x-transition:enter-start="transform -translate-x-full"
                    x-transition:enter-end="transform translate-x-0"
                    x-transition:leave="transition ease-in duration-200"
                    x-transition:leave-start="transform translate-x-0"
                    x-transition:leave-end="transform -translate-x-full">
                    <div
                        class="p-3 border-b border-[var(--border-light)] flex justify-between items-center bg-[var(--bg-sub)] sticky top-0 z-10">
                        <span class="text-xs font-bold text-[var(--text-sub)] uppercase">Script List</span>
                        <div class="flex items-center gap-2">
                            <template x-if="!isFileMode">
                                <div class="flex gap-2">
                                    <button @click="$refs.importRegexInput.click()"
                                        class="text-xs bg-[var(--bg-panel)] border border-[var(--border-light)] hover:bg-[var(--bg-hover)] px-2 py-1 rounded transition"
                                        title="导入正则">
                                        📥
                                    </button>
                                    <input type="file" x-ref="importRegexInput" @change="importRegex" accept=".json"
                                        style="display:none;">
                                    <button @click="addRegexScript()"
                                        class="text-xs bg-green-600 hover:bg-green-500 text-white px-2 py-1 rounded transition">
                                        + 新建
                                    </button>
                                </div>
                            </template>
                        </div>
                    </div>

                    <div class="flex flex-col">
                        <template x-for="(script, idx) in editingData.extensions.regex_scripts" :key="script.id || idx">
                            <!-- 使用 flex 布局，移除 pr-8 和 relative，改为 items-center -->
                            <div class="adv-list-item group flex items-center justify-between gap-2"
                                :class="activeRegexIndex === idx ? 'active' : ''"
                                @click="activeRegexIndex = idx; if($store.global.deviceType === 'mobile') showMobileSidebar = false">

                                <!-- 左侧：文本信息 (占据剩余空间) -->
                                <div class="flex-1 min-w-0 overflow-hidden">
                                    <div class="flex justify-between items-center mb-1">
                                        <span class="font-bold text-sm truncate"
                                            :class="script.disabled ? 'text-gray-500 line-through' : 'text-[var(--text-main)]'"
                                            x-text="script.scriptName || '未命名脚本'"></span>
                                    </div>
                                    <div class="text-[10px] font-mono text-[var(--text-dim)] truncate"
                                        x-text="script.findRegex || 'Empty Regex'"></div>

                                    <!-- 状态小标 -->
                                    <div class="flex gap-1 mt-1">
                                        <span x-show="script.runOnEdit" class="w-2 h-2 rounded-full bg-blue-500"
                                            title="Run On Edit"></span>
                                        <span x-show="script.placement && script.placement.length > 0"
                                            class="w-2 h-2 rounded-full bg-purple-500" title="Has Placement"></span>
                                    </div>
                                </div>

                                <!-- 右侧：操作按钮组 (悬停显示，Flex布局防止错位) -->
                                <div
                                    class="flex flex-col gap-1 opacity-0 group-hover:opacity-100 transition-opacity flex-shrink-0">
                                    <template x-if="!isFileMode">
                                        <div class="flex gap-1">
                                            <div
                                                class="flex flex-col gap-1 opacity-0 group-hover:opacity-100 transition-opacity flex-shrink-0">
                                                <button @click.stop="exportRegex(idx)" class="sort-btn-xs rounded"
                                                    title="导出">📤</button>
                                                <div class="flex flex-col">
                                                    <button @click.stop="moveRegex(idx, -1)"
                                                        class="sort-btn-xs rounded-t border-b-0" title="上移">▲</button>
                                                    <button @click.stop="moveRegex(idx, 1)"
                                                        class="sort-btn-xs rounded-b" title="下移">▼</button>
                                                </div>
                                            </div>
                                            <button @click.stop="removeRegexScript(idx)"
                                                class="opacity-0 group-hover:opacity-100 text-gray-500 hover:text-red-400 p-1 flex-shrink-0 transition">
                                                ✕
                                            </button>
                                        </div>
                                    </template>
                                </div>


                            </div>
                        </template>

                        <div x-show="editingData.extensions.regex_scripts.length === 0"
                            class="p-8 text-center text-[var(--text-dim)] text-xs">
                            暂无正则脚本<br>点击上方按钮添加
                        </div>
                    </div>
                </div>

                <!-- 右侧：编辑器 -->
                <template
                    x-if="activeRegexIndex !== -1 && editingData.extensions.regex_scripts && editingData.extensions.regex_scripts[activeRegexIndex]">
                    <div class="adv-editor-pane custom-scrollbar">
                        <!-- 移除 x-data="{ script: ... }"，改为直接绑定路径，确保切换索引时数据实时刷新 -->
                        <div class="flex flex-col gap-4">

                            <!-- A. 基础信息栏 -->
                            <div class="flex gap-4 items-end border-b border-[var(--border-light)] pb-4">
                                <div class="flex-1">
                                    <label class="form-label">脚本名称 (Script Name)</label>
                                    <input type="text"
                                        x-model="editingData.extensions.regex_scripts[activeRegexIndex].scriptName"
                                        class="form-input font-bold text-lg">
                                </div>
                                <div class="flex gap-4 pb-2">
                                    <label class="flex items-center gap-2 cursor-pointer select-none"
                                        title="6. 在编辑时运行，当指定角色的消息被编辑时运行正则脚本。">
                                        <input type="checkbox"
                                            x-model="editingData.extensions.regex_scripts[activeRegexIndex].runOnEdit"
                                            class="w-4 h-4 rounded accent-blue-500">
                                        <span class="text-sm text-[var(--text-main)]">编辑时运行</span>
                                    </label>
                                    <label class="flex items-center gap-2 cursor-pointer select-none" title="禁用此脚本">
                                        <input type="checkbox"
                                            x-model="editingData.extensions.regex_scripts[activeRegexIndex].disabled"
                                            class="w-4 h-4 rounded accent-red-500">
                                        <span class="text-sm font-bold text-red-400">禁用</span>
                                    </label>
                                </div>
                            </div>

                            <!-- B. 正则核心 (Find) -->
                            <div class="adv-section">
                                <div class="adv-section-title">
                                    <span>🔍 查找 (Match)</span>
                                    <div class="flex items-center gap-2">
                                        <span class="text-[10px] text-[var(--text-dim)]"
                                            title="8. 宏替换：在运行正则表达式之前，替换{{macros}}">宏替换:</span>
                                        <select
                                            x-model.number="editingData.extensions.regex_scripts[activeRegexIndex].substituteRegex"
                                            class="bg-[var(--bg-sub)] border border-[var(--border-light)] text-[10px] rounded px-2 py-1 outline-none text-[var(--text-main)]">
                                            <option value="0">None (不替换)</option>
                                            <option value="1">Raw (原始)</option>
                                            <option value="2">Escaped (转义)</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="relative">
                                    <span class="absolute left-3 top-2.5 text-yellow-500 font-mono text-sm">/</span>
                                    <input type="text"
                                        x-model="editingData.extensions.regex_scripts[activeRegexIndex].findRegex"
                                        class="form-input font-mono text-sm pl-6 pr-12"
                                        style="color: #eab308; background: var(--bg-code);" placeholder="regex pattern">
                                    <span class="absolute right-3 top-2.5 text-yellow-500 font-mono text-sm">/gm</span>
                                </div>
                                <div class="flex gap-4 mt-2">
                                    <label class="flex items-center gap-2 cursor-pointer">
                                        <input type="checkbox"
                                            x-model="editingData.extensions.regex_scripts[activeRegexIndex].caseSensitive"
                                            class="rounded bg-gray-700">
                                        <span class="text-xs text-[var(--text-sub)]">区分大小写 (Case Sensitive)</span>
                                    </label>
                                </div>
                            </div>

                            <!-- C. 替换与剔除 (Replace & Trim) -->
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <!-- 替换 -->
                                <div class="adv-section flex flex-col h-48">
                                    <div class="adv-section-title text-green-500">✨ 替换内容 (Replace With)</div>
                                    <textarea
                                        x-model="editingData.extensions.regex_scripts[activeRegexIndex].replaceString"
                                        class="form-textarea font-mono text-xs flex-1 resize-none custom-scrollbar"
                                        style="color: #22c55e; background: var(--bg-code);"
                                        placeholder="Replacement string (supports $1, $2...)"></textarea>
                                </div>
                                <!-- 剔除 -->
                                <div class="adv-section flex flex-col h-48">
                                    <div class="adv-section-title text-blue-400">✂️ 剔除字符串 (Trim Out)</div>
                                    <textarea
                                        :value="getTrimStringsText(editingData.extensions.regex_scripts[activeRegexIndex])"
                                        @input="updateTrimStrings(editingData.extensions.regex_scripts[activeRegexIndex], $event.target.value)"
                                        class="form-textarea font-mono text-xs flex-1 resize-none custom-scrollbar"
                                        style="background: var(--bg-code);"
                                        placeholder="One string per line to remove before regex runs"></textarea>
                                </div>
                            </div>

                            <!-- D. 高级设置 (Placement & Depth) -->
                            <div class="adv-section">
                                <div class="adv-section-title">⚙️ 作用范围与限制 (Settings)</div>
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

                                    <!-- 作用范围 Placement -->
                                    <div>
                                        <label class="form-label mb-2">生效位置 (Placement)</label>
                                        <div class="grid grid-cols-2 gap-y-2 gap-x-4">
                                            <label class="flex items-center gap-2 cursor-pointer select-none"
                                                title="1. 用户输入：用户发送的信息">
                                                <input type="checkbox"
                                                    :checked="editingData.extensions.regex_scripts[activeRegexIndex].placement?.includes(1)"
                                                    @change="toggleRegexPlacement(editingData.extensions.regex_scripts[activeRegexIndex], 1)"
                                                    class="w-3.5 h-3.5 rounded">
                                                <span class="text-xs">用户输入 (User)</span>
                                            </label>
                                            <label class="flex items-center gap-2 cursor-pointer select-none"
                                                title="2. AI输出从生成式AI中获取的信息">
                                                <input type="checkbox"
                                                    :checked="editingData.extensions.regex_scripts[activeRegexIndex].placement?.includes(2)"
                                                    @change="toggleRegexPlacement(editingData.extensions.regex_scripts[activeRegexIndex], 2)"
                                                    class="w-3.5 h-3.5 rounded">
                                                <span class="text-xs">AI 输出 (AI)</span>
                                            </label>
                                            <label class="flex items-center gap-2 cursor-pointer select-none"
                                                title="3. 快捷命令：通过 STscript 命令发送的消息">
                                                <input type="checkbox"
                                                    :checked="editingData.extensions.regex_scripts[activeRegexIndex].placement?.includes(3)"
                                                    @change="toggleRegexPlacement(editingData.extensions.regex_scripts[activeRegexIndex], 3)"
                                                    class="w-3.5 h-3.5 rounded">
                                                <span class="text-xs">快捷命令 (Slash)</span>
                                            </label>
                                            <label class="flex items-center gap-2 cursor-pointer select-none"
                                                title="4. 世界信息：知识书/世界书 条目的内容。需要勾选'仅格式提示词'！">
                                                <input type="checkbox"
                                                    :checked="editingData.extensions.regex_scripts[activeRegexIndex].placement?.includes(5)"
                                                    @change="toggleRegexPlacement(editingData.extensions.regex_scripts[activeRegexIndex], 5)"
                                                    class="w-3.5 h-3.5 rounded">
                                                <span class="text-xs">世界信息 (WI)</span>
                                            </label>
                                            <label class="flex items-center gap-2 cursor-pointer select-none"
                                                title="5. 推理：推理块内容。当'仅格式提示词'被选中时，它会影响提示词里的推理内容。">
                                                <input type="checkbox"
                                                    :checked="editingData.extensions.regex_scripts[activeRegexIndex].placement?.includes(6)"
                                                    @change="toggleRegexPlacement(editingData.extensions.regex_scripts[activeRegexIndex], 6)"
                                                    class="w-3.5 h-3.5 rounded">
                                                <span class="text-xs">推理 (Reasoning)</span>
                                            </label>
                                        </div>
                                    </div>

                                    <!-- 限制与模式 -->
                                    <div class="flex flex-col gap-3">
                                        <div class="flex gap-4">
                                            <div class="flex-1">
                                                <label class="text-[10px] text-[var(--text-dim)] uppercase block mb-1"
                                                    title="7. 最小深度... '0'为最后一条消息">最小深度 (Min Depth)</label>
                                                <input type="number"
                                                    x-model.number="editingData.extensions.regex_scripts[activeRegexIndex].minDepth"
                                                    class="form-input text-xs py-1" placeholder="Unlimited">
                                            </div>
                                            <div class="flex-1">
                                                <label class="text-[10px] text-[var(--text-dim)] uppercase block mb-1"
                                                    title="7. 最大深度...">最大深度 (Max Depth)</label>
                                                <input type="number"
                                                    x-model.number="editingData.extensions.regex_scripts[activeRegexIndex].maxDepth"
                                                    class="form-input text-xs py-1" placeholder="Unlimited">
                                            </div>
                                        </div>
                                        <div class="flex gap-4 pt-1 border-t border-[var(--border-light)] mt-1">
                                            <label class="flex items-center gap-2 cursor-pointer select-none"
                                                title="9. 仅格式显示：正则仅对聊天页面生效，聊天文件内的内容不会被改变。">
                                                <input type="checkbox"
                                                    x-model="editingData.extensions.regex_scripts[activeRegexIndex].markdownOnly"
                                                    class="w-3.5 h-3.5 rounded">
                                                <span class="text-xs text-[var(--text-sub)]">仅格式显示</span>
                                            </label>
                                            <label class="flex items-center gap-2 cursor-pointer select-none"
                                                title="10. 仅格式提示词：聊天记录不会改变，只有在请求发送时（生成时）才会出现提示词。">
                                                <input type="checkbox"
                                                    x-model="editingData.extensions.regex_scripts[activeRegexIndex].promptOnly"
                                                    class="w-3.5 h-3.5 rounded">
                                                <span class="text-xs text-[var(--text-sub)]">仅格式提示词</span>
                                            </label>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- E. 实时测试台 (Test Bench) -->
                            <div class="adv-section bg-[var(--bg-sub)]">
                                <div class="adv-section-title text-purple-400">
                                    <span>🧪 实时测试台 (JS Regex Playground)</span>
                                    <button @click="runRegexTest()"
                                        class="text-xs bg-purple-600 hover:bg-purple-500 text-white px-3 py-1 rounded shadow-md transition">
                                        ▶ 运行测试
                                    </button>
                                </div>
                                <div class="test-bench-grid">
                                    <!-- 输入 -->
                                    <div class="test-io-box">
                                        <div class="test-io-header">输入文本 (Input)</div>
                                        <textarea x-model="regexTestInput" @input.debounce.300ms="runRegexTest()"
                                            class="test-io-content custom-scrollbar"
                                            placeholder="Paste test text here..."></textarea>
                                    </div>
                                    <!-- 输出 -->
                                    <div class="test-io-box">
                                        <div class="test-io-header">
                                            <span>输出结果 (Result)</span>
                                            <div class="flex items-center gap-2">
                                                <!-- 放大按钮 -->
                                                <button x-show="regexPreviewMode==='html'"
                                                    @click="$dispatch('open-html-preview', regexTestResult)"
                                                    title="全屏预览"
                                                    class="text-[10px] bg-[var(--bg-panel)] border border-[var(--border-light)] rounded px-2 py-[2px] hover:text-[var(--accent-light)] transition">
                                                    ⤢ 放大
                                                </button>

                                                <!-- 切换按钮 -->
                                                <div class="toggle-pill">
                                                    <div @click="regexPreviewMode='text'" class="toggle-pill-btn"
                                                        :class="regexPreviewMode==='text'?'active':''">Text</div>
                                                    <div @click="regexPreviewMode='html'" class="toggle-pill-btn"
                                                        :class="regexPreviewMode==='html'?'active':''">HTML</div>
                                                </div>
                                            </div>
                                        </div>

                                        <!-- 纯文本显示 -->
                                        <textarea x-show="regexPreviewMode==='text'" readonly
                                            class="test-io-content custom-scrollbar" x-text="regexTestResult"
                                            placeholder="Result will appear here..."></textarea>

                                        <!-- HTML 渲染显示 (Shadow DOM) -->
                                        <div x-show="regexPreviewMode==='html'" class="test-io-render-box"
                                            x-effect="renderUnifiedPreviewHost($el, regexPreviewMode==='html' ? regexTestResult : null, { runtimeOwner: 'regex-test-bench', runtimeLabel: 'Regex Test Bench Preview', scroll: true, minHeight: 200, maxHeight: 0, embeddedStageStyle: false })">
                                        </div>
                                    </div>
                                </div>
                            </div>

                        </div>
                    </div>
                </template>


                <!-- 未选中脚本时的占位 -->
                <div class="adv-editor-pane flex items-center justify-center text-[var(--text-dim)]"
                    x-show="activeRegexIndex === -1 || !editingData.extensions.regex_scripts[activeRegexIndex]">
                    <div class="text-center">
                        <div class="text-4xl mb-2 opacity-30">🧩</div>
                        <p>请在左侧选择或新建一个正则脚本</p>
                    </div>
                </div>
            </div>

            <!-- === Tab 2: Scripts (Placeholder / Simple List) === -->
            <div x-show="activeTab==='scripts'" class="adv-split-view">

                <!-- 左侧：脚本列表 -->
                <div class="adv-list-pane custom-scrollbar overflow-y-auto" :class="{
                        'hidden md:flex': $store.global.deviceType !== 'mobile',
                        'top-14': $store.global.deviceType !== 'mobile',
                        'top-0': $store.global.deviceType === 'mobile',
                        'fixed left-0 bottom-0 z-50 w-[280px] max-w-[85vw] shadow-2xl flex flex-col': $store.global.deviceType === 'mobile' && showMobileSidebar,
                        'hidden': $store.global.deviceType === 'mobile' && !showMobileSidebar
                    }">

                    <div
                        class="p-3 border-b border-[var(--border-light)] flex justify-between items-center bg-[var(--bg-sub)] sticky top-0 z-10">
                        <span class="text-xs font-bold text-[var(--text-sub)] uppercase">Helper Scripts</span>
                        <div class="flex items-center gap-1">
                            <template x-if="!isFileMode">
                                <div class="flex gap-1">
                                    <button @click="$refs.importScriptInput.click()"
                                        class="text-xs bg-[var(--bg-panel)] border border-[var(--border-light)] hover:bg-[var(--bg-hover)] px-2 py-1 rounded transition"
                                        title="导入脚本">
                                        📥
                                    </button>
                                    <input type="file" x-ref="importScriptInput" @change="importScript" accept=".json"
                                        style="display:none;">

                                    <button @click="addTavernScript()"
                                        class="text-xs bg-green-600 hover:bg-green-500 text-white px-2 py-1 rounded transition">
                                        + 新建
                                    </button>
                                </div>
                            </template>
                        </div>
                    </div>

                    <div class="flex flex-col">
                        <template x-for="(script, idx) in getTavernScripts()" :key="script.id || idx">
                            <div class="adv-list-item group flex items-center justify-between gap-2"
                                :class="activeScriptIndex === idx ? 'active' : ''"
                                @click="activeScriptIndex = idx; if($store.global.deviceType === 'mobile') showMobileSidebar = false">

                                <!-- 左侧信息 -->
                                <div class="flex-1 min-w-0 overflow-hidden">
                                    <div class="flex justify-between items-center mb-1">
                                        <span class="font-bold text-sm truncate"
                                            :class="!script.enabled ? 'text-gray-500 line-through' : 'text-[var(--text-main)]'"
                                            x-text="script.name || '未命名脚本'"></span>
                                    </div>
                                    <div class="text-[10px] text-[var(--text-dim)] truncate"
                                        x-text="script.info || 'No description'"></div>
                                </div>

                                <!-- 操作按钮 -->
                                <div
                                    class="flex flex-col gap-1 opacity-0 group-hover:opacity-100 transition-opacity flex-shrink-0">
                                    <template x-if="!isFileMode">
                                        <div class="flex gap-1">
                                            <div
                                                class="flex flex-col gap-1 opacity-0 group-hover:opacity-100 transition-opacity flex-shrink-0">
                                                <button @click.stop="exportScript(idx)" class="sort-btn-xs rounded"
                                                    title="导出">📤</button>
                                                <div class="flex flex-col">
                                                    <button @click.stop="moveTavernScript(script.id, -1)"
                                                        class="sort-btn-xs rounded-t border-b-0" title="上移">▲</button>
                                                    <button @click.stop="moveTavernScript(script.id, 1)"
                                                        class="sort-btn-xs rounded-b" title="下移">▼</button>
                                                </div>
                                            </div>

                                        </div>
                                    </template>
                                </div>

            </button>
                <button x-show="!isFileMode" @click="applyChangesAndClose()"
                    class="btn-primary px-6 py-2 rounded shadow-lg font-bold w-full md:w-auto">
                完成
            </button>
                <button x-show="isFileMode" @click="saveFileChanges()"
                    class="btn-primary px-6 py-2 rounded shadow-lg font-bold w-full md:w-auto">
                保存文件
            </button>
            </div>
        </div>

        
        <!-- 移动端：侧边栏切换按钮 -->
        <button x-show="$store.global.deviceType === 'mobile' && !showMobileSidebar"
            @click="showMobileSidebar = true"
            class="fixed bottom-20 left-2 z-50 w-10 h-10 bg-[var(--bg-panel)] border border-[var(--border-light)] rounded-lg flex items-center justify-center text-[var(--text-main)] shadow-lg md:hidden">
            <span>📋</span>
        </button>

        <!-- 移动端：侧边栏遮罩 -->
        <div x-show="$store.global.deviceType === 'mobile' && showMobileSidebar"
            @click="showMobileSidebar = false"
            class="fixed inset-0 bg-black/50 z-40"
            x-transition:enter="transition ease-out duration-300"
            x-transition:enter-start="opacity-0"
            x-transition:enter-end="opacity-100"
            x-transition:leave="transition ease-in duration-200"
            x-transition:leave-start="opacity-100"
            x-transition:leave-end="opacity-0"></div>
        </div>

    </div>
</div>
