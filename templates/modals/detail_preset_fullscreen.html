<!-- 预设全屏编辑器 -->
<div
  x-show="showPresetEditor"
  x-data="presetEditor"
  x-cloak
  class="detail-preset-full-screen fixed inset-0 z-modal-editor bg-[var(--bg-body)]"
>
  <div class="flex flex-col h-full w-full overflow-hidden">
    <div
      x-show="$store.global.deviceType !== 'mobile'"
      x-cloak
      class="flex h-12 border-b border-[var(--border-main)] bg-[var(--bg-panel)] px-4 items-center justify-between gap-4 flex-shrink-0"
    >
      <div class="flex items-center gap-3 min-w-0">
        <div class="text-[var(--accent-main)] font-bold text-sm">
          预设编辑器
        </div>
        <div
          class="px-2 py-0.5 rounded text-[10px] font-bold uppercase border border-[var(--border-light)] text-[var(--text-main)] bg-[var(--bg-sub)]"
          x-text="editingPresetFile?.preset_kind || '预设'"
        ></div>
        <div class="min-w-0">
          <div
            class="text-sm font-bold truncate text-[var(--text-main)]"
            x-text="presetTitle"
          ></div>
          <div
            class="text-[10px] text-[var(--text-dim)] truncate"
            x-text="editingPresetFile?.path || ''"
          ></div>
        </div>
      </div>

      <div class="flex items-center gap-2 flex-wrap justify-end">
        <div x-show="hasMultipleVersions" class="flex items-center gap-2">
          <label class="text-[11px] text-[var(--text-dim)]">版本</label>
          <select
            :value="editingPresetFile?.id || ''"
            @change="openVersion($event.target.value)"
            class="rounded-lg border border-[var(--border-light)] bg-[var(--bg-panel)] px-2.5 py-1.5 text-xs text-[var(--text-main)]"
          >
            <template x-for="version in availableVersions" :key="version.id">
              <option :value="version.id" x-text="version.version_label || version.name || version.id"></option>
            </template>
          </select>
        </div>
        <span
          class="text-[10px] px-2 py-1 rounded border border-[var(--border-light)]"
          :class="isDirty ? 'text-amber-300 bg-amber-500/10' : 'text-green-300 bg-green-500/10'"
          x-text="isDirty ? '未保存修改' : '磁盘已同步'"
        ></span>
        <span
          x-show="draftState.savedAt"
          class="text-[10px] px-2 py-1 rounded border border-[var(--border-light)] text-sky-300 bg-sky-500/10"
          x-text="`草稿 ${formatDate(draftState.savedAt, { includeYear: true })}`"
        ></span>
        <span
          x-show="hasConflict"
          class="text-[10px] px-2 py-1 rounded border border-red-500/40 text-red-300 bg-red-500/10"
        >
          检测到磁盘冲突
        </span>
        <button
          @click="saveOverwrite()"
          :disabled="isSaving"
          class="btn-primary px-3 py-1.5 text-xs rounded"
        >
          保存
        </button>
        <button
          @click="saveAs()"
          class="btn-secondary px-3 py-1.5 text-xs rounded"
        >
          另存为
        </button>
        <button
          @click="saveAsVersion()"
          class="btn-secondary px-3 py-1.5 text-xs rounded"
        >
          另存为版本
        </button>
        <button
          x-show="hasMultipleVersions"
          @click="setCurrentVersionAsDefault()"
          class="btn-secondary px-3 py-1.5 text-xs rounded"
        >
          设为默认版本
        </button>
        <button
          @click="renamePreset()"
          class="btn-secondary px-3 py-1.5 text-xs rounded"
        >
          重命名
        </button>
        <button
          @click="deletePreset()"
          class="btn-secondary px-3 py-1.5 text-xs rounded"
        >
          删除
        </button>
        <button
          @click="createSnapshot()"
          class="btn-secondary px-3 py-1.5 text-xs rounded"
        >
          创建快照
        </button>
        <button
          @click="openRollback()"
          class="btn-secondary px-3 py-1.5 text-xs rounded"
        >
          回滚
        </button>
        <button
          @click="openAdvancedExtensions()"
          class="btn-secondary px-3 py-1.5 text-xs rounded"
        >
          编辑扩展
        </button>
        <button
          @click="closeEditor()"
          class="btn-secondary px-3 py-1.5 text-xs rounded hover:text-red-300"
        >
          关闭
        </button>
      </div>
    </div>

    <div
      x-show="$store.global.deviceType === 'mobile'"
      x-cloak
      class="preset-editor-mobile-header"
      :class="presetEditorMobileHeaderCompact ? 'is-compact' : ''"
      x-ref="presetEditorMobileHeader"
    >
      <div class="preset-editor-mobile-header-top">
        <button
          @click="closeEditor()"
          class="btn-secondary px-3 py-1.5 text-xs rounded shrink-0"
        >
          关闭
        </button>

        <div class="preset-editor-mobile-title-block">
          <div class="preset-editor-mobile-title" x-text="presetTitle"></div>
          <div
            class="preset-editor-mobile-subtitle"
            x-text="getMobileHeaderMetaLine()"
          ></div>
        </div>

        <button
          @click="saveOverwrite()"
          :disabled="isSaving"
          class="btn-primary px-3 py-1.5 text-xs rounded shrink-0"
        >
          保存
        </button>

        <button
          @click="toggleMobileHeaderMoreMenu()"
          class="btn-secondary px-3 py-1.5 text-xs rounded shrink-0"
        >
          更多
        </button>
      </div>

      <div
        x-show="hasMultipleVersions"
        x-cloak
        class="px-4 pb-2 flex items-center gap-2"
      >
        <label class="sr-only">版本</label>
        <select
          :value="editingPresetFile?.id || ''"
          @change="openVersion($event.target.value)"
          class="flex-1 min-w-0 rounded-xl border border-[var(--border-light)] bg-[var(--bg-panel)] px-3 py-2 text-sm text-[var(--text-main)]"
        >
          <template x-for="version in availableVersions" :key="version.id">
            <option :value="version.id" x-text="version.version_label || version.name || version.id"></option>
          </template>
        </select>
      </div>

      <div class="preset-editor-mobile-header-bottom">
        <span
          class="preset-editor-mobile-status-chip"
          :class="hasConflict ? 'is-danger' : (isDirty ? 'is-warn' : 'is-ok')"
          x-text="getCompactHeaderStatusLabel()"
        ></span>
        <span
          x-show="draftState.savedAt"
          class="preset-editor-mobile-status-text"
          x-text="`草稿 ${formatDate(draftState.savedAt, { includeYear: true })}`"
        ></span>
      </div>
    </div>

    <div
      x-show="$store.global.deviceType === 'mobile' && showMobileHeaderMoreMenu"
      x-cloak
      class="preset-editor-mobile-more-menu"
    >
      <button
        @click="saveAs()"
        class="btn-secondary px-3 py-2 text-sm rounded-xl"
      >
        另存为
      </button>
      <button
        @click="saveAsVersion()"
        class="btn-secondary px-3 py-2 text-sm rounded-xl"
      >
        另存为版本
      </button>
      <button
        x-show="hasMultipleVersions"
        @click="setCurrentVersionAsDefault()"
        class="btn-secondary px-3 py-2 text-sm rounded-xl"
      >
        设为默认版本
      </button>
      <button
        @click="renamePreset()"
        class="btn-secondary px-3 py-2 text-sm rounded-xl"
      >
        重命名
      </button>
      <button
        @click="deletePreset()"
        class="btn-secondary px-3 py-2 text-sm rounded-xl text-red-300"
      >
        删除
      </button>
      <button
        @click="createSnapshot()"
        class="btn-secondary px-3 py-2 text-sm rounded-xl"
      >
        创建快照
      </button>
      <button
        @click="openRollback()"
        class="btn-secondary px-3 py-2 text-sm rounded-xl"
      >
        回滚
      </button>
      <button
        @click="openAdvancedExtensions()"
        class="btn-secondary px-3 py-2 text-sm rounded-xl"
      >
        编辑扩展
      </button>
    </div>

    <div class="flex-1 flex overflow-hidden bg-[var(--bg-body)]">
      <aside
        class="preset-editor-sidebar border-r border-[var(--border-main)] bg-[var(--bg-sub)] flex-shrink-0 overflow-y-auto custom-scrollbar"
        :class="$store.global.deviceType === 'mobile' ? (showMobileSidebar ? 'preset-editor-mobile-panel preset-editor-mobile-panel--left w-full max-w-[22rem]' : 'hidden') : 'md:block md:w-80'"
      >
        <div class="p-4 space-y-4">
          <div class="flex items-center justify-between gap-3 md:hidden">
            <div class="text-sm font-bold text-[var(--text-main)]">
              字段导航
            </div>
            <button
              @click="closeMobileSidebar()"
              class="btn-secondary px-3 py-1 text-xs rounded"
            >
              收起
            </button>
          </div>

          <template
            x-if="!isPromptWorkspaceEditor || activeWorkspace !== 'prompts'"
          >
            <div
              class="rounded-2xl border border-[var(--border-light)] bg-[var(--bg-panel)] p-4 space-y-3"
            >
              <div class="text-xs text-[var(--text-dim)]">字段筛选</div>
              <div
                class="text-sm font-bold text-[var(--text-main)]"
                x-text="editingPresetFile?.preset_kind_label || '预设'"
              ></div>
              <input
                x-model="searchTerm"
                type="search"
                placeholder="搜索字段标题、路径或摘要"
                class="form-input"
              />
              <div class="flex flex-wrap gap-2">
                <button
                  @click="uiFilter = 'all'"
                  class="px-3 py-1.5 rounded-full text-xs border transition-colors"
                  :class="uiFilter === 'all' ? 'bg-[var(--accent-main)]/15 text-[var(--text-main)] border-[var(--accent-main)]/30' : 'bg-[var(--bg-body)] text-[var(--text-dim)] border-[var(--border-light)]'"
                >
                  全部
                </button>
                <button
                  @click="uiFilter = 'editable'"
                  class="px-3 py-1.5 rounded-full text-xs border transition-colors"
                  :class="uiFilter === 'editable' ? 'bg-[var(--accent-main)]/15 text-[var(--text-main)] border-[var(--accent-main)]/30' : 'bg-[var(--bg-body)] text-[var(--text-dim)] border-[var(--border-light)]'"
                >
                  可编辑
                </button>
                <button
                  @click="uiFilter = 'changed'"
                  class="px-3 py-1.5 rounded-full text-xs border transition-colors"
                  :class="uiFilter === 'changed' ? 'bg-[var(--accent-main)]/15 text-[var(--text-main)] border-[var(--accent-main)]/30' : 'bg-[var(--bg-body)] text-[var(--text-dim)] border-[var(--border-light)]'"
                >
                  已修改
                </button>
                <button
                  @click="uiFilter = 'collections'"
                  class="px-3 py-1.5 rounded-full text-xs border transition-colors"
                  :class="uiFilter === 'collections' ? 'bg-[var(--accent-main)]/15 text-[var(--text-main)] border-[var(--accent-main)]/30' : 'bg-[var(--bg-body)] text-[var(--text-dim)] border-[var(--border-light)]'"
                >
                  集合
                </button>
                <button
                  @click="uiFilter = 'longtext'"
                  class="px-3 py-1.5 rounded-full text-xs border transition-colors"
                  :class="uiFilter === 'longtext' ? 'bg-[var(--accent-main)]/15 text-[var(--text-main)] border-[var(--accent-main)]/30' : 'bg-[var(--bg-body)] text-[var(--text-dim)] border-[var(--border-light)]'"
                >
                  长文本
                </button>
              </div>
              <div class="text-[11px] text-[var(--text-dim)]">
                <span x-show="uiFilter === 'all'">全部: 显示当前分区全部字段</span>
                <span x-show="uiFilter === 'editable'"
                  >可编辑: 仅显示可直接编辑的字段</span
                >
                <span x-show="uiFilter === 'changed'">已修改: 仅显示已修改字段</span>
                <span x-show="uiFilter === 'collections'"
                  >集合: 仅显示列表与复合字段</span
                >
                <span x-show="uiFilter === 'longtext'">长文本: 仅显示长文本字段</span>
              </div>
            </div>
          </template>

          <template
            x-if="isPromptWorkspaceEditor && activeWorkspace === 'prompts'"
          >
            <div
              class="rounded-2xl border border-[var(--border-light)] bg-[var(--bg-panel)] p-4 space-y-3"
            >
              <div class="text-xs text-[var(--text-dim)]">提示词列表</div>
              <div class="text-sm font-bold text-[var(--text-main)]">
                提示词工作区
              </div>
              <div class="text-[11px] text-[var(--text-dim)]">
                左侧管理提示词顺序与启用状态，中间编辑当前提示词内容与参数。
              </div>
            </div>
          </template>

          <template x-if="isMirroredProfileEditor && editorProfile">
            <div
              class="rounded-2xl border border-[var(--border-light)] bg-[var(--bg-panel)] p-3 space-y-2"
            >
              <div class="text-xs text-[var(--text-dim)]">分区</div>
              <template
                x-for="section in mirroredProfileSections"
                :key="section.id"
              >
                <button
                  @click="selectWorkspace(section.id === 'prompt_manager' ? 'prompts' : section.id)"
                  class="w-full text-left px-3 py-2 rounded-xl text-sm border transition-colors"
                  :class="activeMirroredSection?.id === section.id ? 'bg-[var(--accent-main)]/15 text-[var(--text-main)] border-[var(--accent-main)]/30' : 'bg-[var(--bg-body)] text-[var(--text-dim)] border-transparent hover:border-[var(--border-light)] hover:text-[var(--text-main)]'"
                >
                  <div class="flex items-center justify-between gap-3">
                    <div
                      class="font-medium"
                      x-text="section.label || section.id"
                    ></div>
                    <div
                      class="text-[11px] text-[var(--text-dim)]"
                      x-text="getMirroredSectionFieldCount(section.id)"
                    ></div>
                  </div>
                  <div
                    class="text-[11px] text-[var(--text-dim)] truncate"
                    x-text="section.description || section.id"
                  ></div>
                </button>
              </template>
            </div>
          </template>

          <template x-if="!isMirroredProfileEditor && !isPromptWorkspaceEditor">
            <div
              class="rounded-2xl border border-[var(--border-light)] bg-[var(--bg-panel)] p-3 space-y-2"
            >
              <div class="text-xs text-[var(--text-dim)]">分组</div>
              <button
                @click="selectGroup('all')"
                class="w-full text-left px-3 py-2 rounded-xl text-sm border transition-colors"
                :class="activeGroup === 'all' ? 'bg-[var(--accent-main)]/15 text-[var(--text-main)] border-[var(--accent-main)]/30' : 'bg-[var(--bg-body)] text-[var(--text-dim)] border-transparent hover:border-[var(--border-light)] hover:text-[var(--text-main)]'"
              >
                全部字段
              </button>
              <template x-for="group in editorView.groups" :key="group.id">
                <button
                  @click="selectGroup(group.id)"
                  class="w-full text-left px-3 py-2 rounded-xl text-sm border transition-colors"
                  :class="activeGroup === group.id ? 'bg-[var(--accent-main)]/15 text-[var(--text-main)] border-[var(--accent-main)]/30' : 'bg-[var(--bg-body)] text-[var(--text-dim)] border-transparent hover:border-[var(--border-light)] hover:text-[var(--text-main)]'"
                >
                  <div
                    class="font-medium"
                    x-text="group.title || group.id"
                  ></div>
                  <div
                    class="text-[11px] text-[var(--text-dim)] truncate"
                    x-text="group.summary || group.description || '按分组聚焦该类配置项'"
                  ></div>
                </button>
              </template>
            </div>
          </template>

        </div>
      </aside>

      <main
        class="flex-1 min-w-0 overflow-y-auto custom-scrollbar preset-editor-main-scroll"
        x-ref="presetEditorContentScroll"
        @scroll.passive="handleMobileEditorContentScroll($event)"
      >
        <div class="h-full p-4 md:p-6">
          <div class="flex items-center justify-between gap-3 mb-4 md:hidden">
            <button
              @click="openMobileSidebar()"
              class="btn-secondary px-3 py-1.5 text-xs rounded"
            >
              字段导航
            </button>
            <button
              @click="toggleMobileRightPanel()"
              class="btn-secondary px-3 py-1.5 text-xs rounded"
            >
              详情侧栏
            </button>
          </div>

          <template x-if="isPromptWorkspaceEditor && activeWorkspace === 'prompts'">
              <div class="space-y-4 h-full min-h-0">
                <template x-if="$store.global.deviceType !== 'mobile'">
                  <div
                    class="grid grid-cols-1 xl:grid-cols-[22rem_minmax(0,1fr)] gap-4 h-full min-h-0"
                  >
                    <section
                      class="rounded-2xl border border-[var(--border-light)] bg-[var(--bg-panel)] min-h-[22rem] flex flex-col overflow-hidden"
                    >
                      <div
                        class="px-4 py-3 border-b border-[var(--border-light)] flex items-center justify-between gap-3"
                      >
                        <div>
                          <div class="text-sm font-bold text-[var(--text-main)]">
                            提示词列表
                          </div>
                          <div
                            class="text-[11px] text-[var(--text-dim)]"
                            x-text="`${orderedPromptItems.length} 个提示词`"
                          ></div>
                        </div>
                        <div class="text-[11px] text-[var(--text-dim)]">
                          列表即顺序
                        </div>
                      </div>
                      <div
                        class="flex-1 min-h-0 overflow-y-auto custom-scrollbar p-3 space-y-2"
                      >
                        <template x-if="orderedPromptItems.length === 0">
                          <div
                            class="rounded-xl border border-dashed border-[var(--border-light)] bg-[var(--bg-body)] p-4 text-sm text-[var(--text-dim)]"
                          >
                            当前预设没有可编辑的提示词条目。
                          </div>
                        </template>
                        <template
                          x-for="(prompt, index) in orderedPromptItems"
                          :key="prompt.__identifier"
                        >
                          <article
                            @click="selectPrompt(prompt.__identifier)"
                            class="rounded-xl border p-3 transition-colors cursor-pointer"
                            :class="activePromptId === prompt.__identifier ? 'border-[var(--accent-main)]/40 bg-[var(--accent-main)]/10' : 'border-[var(--border-light)] bg-[var(--bg-body)] hover:border-[var(--accent-main)]/20'"
                          >
                            <div class="flex items-start justify-between gap-3">
                              <div class="min-w-0 flex-1">
                                <div
                                  class="text-sm font-semibold text-[var(--text-main)] truncate"
                                  x-text="prompt.name || prompt.__identifier"
                                ></div>
                                <div
                                  class="text-[11px] text-[var(--text-dim)] truncate"
                                  x-text="getPromptRoleLabel(prompt.role)"
                                ></div>
                              </div>
                              <label
                                class="inline-flex min-h-9 min-w-9 items-center justify-center"
                                @click.stop
                              >
                                <span
                                  class="relative inline-flex h-5 w-9 items-center"
                                >
                                  <input
                                    type="checkbox"
                                    class="peer prompt-toggle-input"
                                    aria-label="切换提示词启用状态"
                                    :checked="prompt.__enabled !== false"
                                    @change="togglePromptEnabled(prompt.__identifier)"
                                  />
                                  <span
                                    class="h-full w-full rounded-full border border-[var(--border-light)] bg-[var(--bg-sub)] transition-colors peer-checked:border-emerald-400/40 peer-checked:bg-emerald-500/20 peer-focus-visible:outline-none peer-focus-visible:ring-2 peer-focus-visible:ring-[var(--accent-main)]/60 peer-focus-visible:ring-offset-2 peer-focus-visible:ring-offset-[var(--bg-body)]"
                                  ></span>
                                  <span
                                    class="pointer-events-none absolute left-[2px] top-[2px] h-4 w-4 rounded-full transition-transform"
                                    :class="prompt.__enabled !== false ? 'translate-x-4 bg-white/90 shadow-sm' : 'bg-white/90 shadow-sm'"
                                  ></span>
                                </span>
                              </label>
                            </div>
                            <div class="mt-2 flex flex-wrap gap-2 text-[10px]">
                              <span
                                x-show="prompt.marker"
                                class="inline-flex items-center gap-1.5 px-2 py-0.5 rounded-full border border-sky-400/30 bg-sky-500/10 text-sky-300"
                              >
                                <span
                                  class="h-3.5 w-3.5"
                                  x-html="getPromptMarkerIcon(prompt)"
                                ></span>
                                预留字段
                              </span>
                              <span
                                class="px-2 py-0.5 rounded-full border border-[var(--border-light)] text-[var(--text-dim)]"
                                x-text="getPromptPositionLabel(prompt)"
                              ></span>
                            </div>
                            <div class="mt-3 flex items-center gap-2">
                              <button
                                @click.stop="movePromptItem(index, index - 1)"
                                class="btn-secondary px-2 py-1 text-xs rounded"
                                :disabled="index === 0"
                              >
                                上移
                              </button>
                              <button
                                @click.stop="movePromptItem(index, index + 1)"
                                class="btn-secondary px-2 py-1 text-xs rounded"
                                :disabled="index === orderedPromptItems.length - 1"
                              >
                                下移
                              </button>
                            </div>
                          </article>
                        </template>
                      </div>
                    </section>

                    <section
                      class="rounded-2xl border border-[var(--border-light)] bg-[var(--bg-panel)] min-h-[22rem] flex flex-col min-w-0 overflow-hidden"
                    >
                      <div
                        class="px-5 py-4 border-b border-[var(--border-light)] flex items-start justify-between gap-4"
                      >
                        <div class="min-w-0">
                          <div class="text-xs text-[var(--text-dim)]">
                            当前提示词
                          </div>
                          <div
                            class="text-lg font-bold text-[var(--text-main)]"
                            x-text="activePromptItem?.name || activePromptItem?.__identifier || '选择左侧提示词开始编辑'"
                          ></div>
                          <div
                            class="text-[11px] text-[var(--text-dim)] break-all"
                            x-text="activePromptItem?.__identifier || 'prompts[]'"
                          ></div>
                        </div>
                      </div>

                      <div
                        class="flex-1 min-h-0 overflow-y-auto custom-scrollbar p-5 space-y-5"
                      >
                        <template x-if="!activePromptItem">
                          <div
                            class="rounded-2xl border border-dashed border-[var(--border-light)] bg-[var(--bg-body)] p-6 text-sm text-[var(--text-dim)]"
                          >
                            请选择一个提示词条目开始编辑。
                          </div>
                        </template>

                        <template x-if="activePromptItem">
                          <div class="space-y-5">
                            <div
                              class="rounded-2xl border border-[var(--border-light)] bg-[var(--bg-body)] p-4 space-y-2"
                            >
                              <div class="text-sm font-bold text-[var(--text-main)]">
                                提示词基础信息
                              </div>
                              <div class="text-sm text-[var(--text-dim)]">
                                按常用提示词编辑方式调整名称、角色、注入位置与触发器。
                              </div>
                            </div>

                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                              <label

                              >
                                <input
                                  class="form-input flex-1"
                                  :value="entry || ''"
                                  @input="updateStringListItem(activeItem.value_path, index, $event.target.value)"
                                />
                                <button
                                  @click="removeStringListItem(activeItem.value_path, index)"
                                  class="btn-secondary px-3 py-1.5 text-xs rounded hover:text-red-300"
                                >
                                  删除
                                </button>
                              </div>
                            </template>
                          </div>
                        </div>
                      </template>

                      <template
                        x-if="activeItem?.editor?.kind === 'key-value-list'"
                      >
                        <div
                          class="rounded-2xl border border-[var(--border-light)] bg-[var(--bg-body)] p-4 space-y-4"
                        >
                          <div class="flex items-center justify-between gap-3">
                            <div>
                              <div
                                class="text-base font-bold text-[var(--text-main)]"
                              >
                                键值列表
                              </div>
                              <div class="text-[11px] text-[var(--text-dim)]">
                                针对 logit_bias 这类 text/value 结构进行编辑。
                              </div>
                            </div>
                            <button
                              @click="addBiasEntry()"
                              class="btn-secondary px-3 py-1.5 text-xs rounded"
                            >
                              添加偏置
                            </button>
                          </div>
                          <div class="space-y-2">
                            <template
                              x-for="(entry, index) in (Array.isArray(getByPath(activeItem.value_path)) ? getByPath(activeItem.value_path) : [])"
                              :key="`${activeItem.id}-bias-${index}`"
                            >
                              <div
                                class="grid grid-cols-1 md:grid-cols-[minmax(0,1fr)_8rem_auto] gap-2 rounded-xl border border-[var(--border-light)] bg-[var(--bg-panel)] p-3"
                              >
                                <input
                                  class="form-input"
                                  :value="entry.text || ''"
                                  @input="updateBiasEntry(index, 'text', $event.target.value)"
                                />
                                <input
                                  type="number"
                                  step="0.1"
                                  class="form-input"
                                  :value="entry.value ?? 0"
                                  @input="updateBiasEntry(index, 'value', $event.target.value)"
                                />
                                <button
                                  @click="removeBiasEntry(index)"
                                  class="btn-secondary px-3 py-1.5 text-xs rounded hover:text-red-300"
                                >
                                  删除
                                </button>
                              </div>
                            </template>
                          </div>
                        </div>
                      </template>

                      <template x-if="activeItem?.editor?.kind === 'textarea'">
                        <div
                          class="rounded-2xl border border-[var(--border-light)] bg-[var(--bg-body)] p-4 space-y-3"
                        >
                          <textarea
                            class="form-textarea min-h-[280px] w-full max-w-full min-w-0 custom-scrollbar"
                            :value="getFieldValue(activeItem) || ''"
                            @input="setFieldValue(activeItem, $event.target.value)"
                          ></textarea>
                          <div
                            class="flex items-center justify-between gap-3 text-[11px] text-[var(--text-dim)]"
                          >
                            <span
                              >保留换行，适合长提示词、说明和模板段落。</span
                            >
                            <span
                              x-text="`约 ${estimateTokens(String(getFieldValue(activeItem) || ''))} tokens`"
                            ></span>
                          </div>
                        </div>
                      </template>

                      <template x-if="activeItem?.editor?.kind === 'boolean'">
                        <label
                          class="rounded-2xl border border-[var(--border-light)] bg-[var(--bg-body)] p-4 flex items-center gap-3 text-sm text-[var(--text-main)]"
                        >
                          <input
                            type="checkbox"
                            class="rounded"
                            :checked="Boolean(getFieldValue(activeItem))"
                            @change="setFieldValue(activeItem, $event.target.checked)"
                          />
                          <span
                            x-text="Boolean(getFieldValue(activeItem)) ? '当前为启用状态' : '当前为关闭状态'"
                          ></span>
                        </label>
                      </template>

                      <template x-if="activeItem?.editor?.kind === 'number'">
                        <div
                          class="rounded-2xl border border-[var(--border-light)] bg-[var(--bg-body)] p-4"
                        >
                          <input
                            type="number"
                            step="0.01"
                            class="form-input"
                            :value="getFieldValue(activeItem) ?? 0"
                            @input="setFieldValue(activeItem, Number($event.target.value))"
                          />
                        </div>
                      </template>

                      <template x-if="activeItem?.editor?.kind === 'select'">
                        <div
                          class="rounded-2xl border border-[var(--border-light)] bg-[var(--bg-body)] p-4"
                        >
                          <select
                            class="form-input"
                            :value="getFieldValue(activeItem) || ''"
                            @change="setFieldValue(activeItem, resolveSelectOptionValue(activeItem, $event.target.value))"
                          >
                            <template
                              x-for="option in (activeItem?.editor?.options || [])"
                              :key="option.value ?? option"
                            >
                              <option
                                :value="option.value ?? option"
                                x-text="option.label ?? option"
                              ></option>
                            </template>
                          </select>
                        </div>
                      </template>

                      <template x-if="activeItem?.editor?.kind === 'text'">
                        <div
                          class="rounded-2xl border border-[var(--border-light)] bg-[var(--bg-body)] p-4"
                        >
                          <input
                            type="text"
                            class="form-input"
                            :value="getFieldValue(activeItem) || ''"
                            @input="setFieldValue(activeItem, $event.target.value)"
                          />
                        </div>
                      </template>

                      <template
                        x-if="activeItem?.editor?.kind === 'raw-json' || !['sortable-string-list', 'string-list', 'key-value-list', 'textarea', 'boolean', 'number', 'select', 'text'].includes(activeItem?.editor?.kind)"
                      >
                        <div
                          class="rounded-2xl border border-[var(--border-light)] bg-[var(--bg-body)] p-4 space-y-3"
                        >
                          <div class="text-sm text-[var(--text-dim)]">
                            当前字段适合通过原始 JSON 视图确认结构。
                          </div>
                          <pre
                            class="text-xs font-mono whitespace-pre-wrap break-words rounded-xl border border-[var(--border-light)] bg-black/20 p-4 text-[var(--text-sub)] max-h-[18rem] overflow-auto custom-scrollbar"
                            x-text="formatValue(getFieldValue(activeItem))"
                          ></pre>
                        </div>
                      </template>
                    </div>
                  </template>
                </div>
              </section>
            </div>
          </template>
        </div>
      </main>

      <aside
        class="preset-editor-context border-l border-[var(--border-main)] bg-[var(--bg-sub)] flex-shrink-0 overflow-y-auto custom-scrollbar"
        x-show="showRightPanel || $store.global.deviceType !== 'mobile'"
        :class="$store.global.deviceType === 'mobile' ? 'preset-editor-mobile-panel preset-editor-mobile-panel--right w-full' : 'w-80'"
      >
        <div class="p-4 space-y-4">
          <div class="flex items-center justify-between gap-3 md:hidden">
            <div class="text-sm font-bold text-[var(--text-main)]">上下文</div>
            <button
              @click="closeMobileRightPanel()"
              class="btn-secondary px-3 py-1 text-xs rounded"
            >
              收起
            </button>
          </div>

          <template
            x-if="isPromptWorkspaceEditor && activeWorkspace === 'prompts'"
          >
            <div
              class="rounded-2xl border border-[var(--border-light)] bg-[var(--bg-panel)] p-4 space-y-3"
            >
              <div class="text-xs text-[var(--text-dim)]">活动提示词</div>
              <div
                class="text-base font-bold text-[var(--text-main)]"
                x-text="activePromptItem?.name || activePromptItem?.__identifier || '尚未选择提示词'"
              ></div>
              <div
                class="text-xs text-[var(--text-dim)]"
                x-text="getPromptRoleLabel(activePromptItem?.role)"
              ></div>
              <div class="grid grid-cols-1 gap-2 text-xs">
                <div>
                  <div class="text-[var(--text-dim)]">标识符</div>
                  <div
                    class="font-mono break-all text-[var(--text-main)]"
                    x-text="activePromptItem?.__identifier || '-'"
                  ></div>
                </div>
                <div>
                  <div class="text-[var(--text-dim)]">位置</div>
                  <div
                    class="text-[var(--text-main)]"
                    x-text="getPromptPositionLabel(activePromptItem)"
                  ></div>
                </div>
                <div class="flex flex-wrap gap-2">
                  <span
                    x-show="activePromptItem?.marker"
                    class="px-2 py-0.5 rounded-full border border-sky-400/30 bg-sky-500/10 text-sky-300"
                  >
                    预留字段
                  </span>
                </div>
              </div>
            </div>
          </template>

          <template
            x-if="!isMirroredProfileEditor && (!isPromptWorkspaceEditor || activeWorkspace !== 'prompts')"
          >
            <div
              class="rounded-2xl border border-[var(--border-light)] bg-[var(--bg-panel)] p-4 space-y-3"
            >
              <div class="text-xs text-[var(--text-dim)]">活动项</div>
              <div
                class="text-base font-bold text-[var(--text-main)]"
                x-text="activeItem?.title || activeItem?.key || activeItem?.id || '尚未选择字段' "
              ></div>
              <div
                class="text-xs text-[var(--text-dim)]"
                x-text="activeItem?.summary || '在左侧选择字段后，这里会显示上下文信息。' "
              ></div>
              <div class="grid grid-cols-1 gap-2 text-xs">
                <div>
                  <div class="text-[var(--text-dim)]">字段路径</div>
                  <div
                    class="font-mono break-all text-[var(--text-main)]"
                    x-text="activeItem?.value_path || activeItem?.source_key || '-' "
                  ></div>
                </div>
                <div>
                  <div class="text-[var(--text-dim)]">编辑器类型</div>
                  <div
                    class="text-[var(--text-main)]"
                    x-text="activeItem?.editor?.kind || 'unknown'"
                  ></div>
                </div>
              </div>
            </div>
          </template>

          <template
            x-if="isMirroredProfileEditor && (!isPromptWorkspaceEditor || activeWorkspace !== 'prompts')"
          >
            <div
              class="rounded-2xl border border-[var(--border-light)] bg-[var(--bg-panel)] p-4 space-y-3"
            >
              <template x-if="!activeMirroredField && mirroredWorkspaceFieldItems.length === 0">
                <div class="text-sm text-[var(--text-dim)]">
                  当前筛选下没有可用字段。
                </div>
              </template>
              <template x-if="!activeMirroredField && mirroredWorkspaceFieldItems.length > 0">
                <div class="text-sm text-[var(--text-dim)]">
                  请先从中间选择一个字段。
                </div>
              </template>
              <template x-if="activeMirroredField">
                <div class="space-y-3">
                  <div class="text-xs text-[var(--text-dim)]">当前字段</div>
                  <div
                    class="text-base font-bold text-[var(--text-main)]"
                    x-text="activeMirroredField?.label || activeMirroredField?.id || '尚未选择字段'"
                  ></div>
                  <div
                    class="text-xs text-[var(--text-dim)]"
                    x-text="activeMirroredField?.description || '调整当前字段的值会直接影响该分区的生成设置。'"
                  ></div>
                  <div class="grid grid-cols-1 gap-2 text-xs">
                      <div>
                        <div class="text-[var(--text-dim)]">当前值</div>
                        <div
                          class="font-mono break-all text-[var(--text-main)]"
                        x-text="formatValue(getProfileFieldValue(activeMirroredField?.id))"
                        ></div>
                      </div>
                    <div>
                      <div class="text-[var(--text-dim)]">默认值</div>
                      <div
                        class="font-mono break-all text-[var(--text-main)]"
                        x-text="formatValue(activeMirroredField?.default ?? '-')"
                      ></div>
                    </div>
                  </div>
                </div>
              </template>
            </div>
            </template>
          </template>

          <div
            class="rounded-2xl border border-[var(--border-light)] bg-[var(--bg-panel)] p-4 space-y-3"
          >
            <div class="text-sm font-bold text-[var(--text-main)]">
              文件信息
            </div>
            <div class="text-xs text-[var(--text-dim)]">路径</div>
            <div
              class="text-xs font-mono break-all text-[var(--text-main)]"
              x-text="editingPresetFile?.path || '-' "
            ></div>
            <div class="grid grid-cols-2 gap-3 text-xs">
              <div>
                <div class="text-[var(--text-dim)]">修改时间</div>
                <div
                  class="text-[var(--text-main)]"
                  x-text="formatDate(editingPresetFile?.mtime, { includeYear: true })"
                ></div>
              </div>
              <div>
                <div class="text-[var(--text-dim)]">文件大小</div>
                <div
                  class="text-[var(--text-main)]"
                  x-text="editingPresetFile?.file_size || 0"
                ></div>
              </div>
            </div>
          </div>

          <div
            class="rounded-2xl border border-[var(--border-light)] bg-[var(--bg-panel)] p-4 space-y-3"
          >
            <div class="text-sm font-bold text-[var(--text-main)]">
              保存检查
            </div>
            <div class="text-xs text-[var(--text-dim)]">修改状态</div>
            <div
              class="text-xs"
              :class="isDirty ? 'text-amber-300' : 'text-green-300'"
              x-text="isDirty ? '存在未保存修改' : '当前与磁盘同步' "
            ></div>
            <div class="text-xs text-[var(--text-dim)]">冲突状态</div>
            <div
              class="text-xs"
              :class="hasConflict ? 'text-red-300' : 'text-green-300'"
              x-text="hasConflict ? `冲突 revision: ${conflictRevision || '未知'}` : '未发现冲突' "
            ></div>
            <div class="text-xs text-[var(--text-dim)]">草稿状态</div>
            <div
              class="text-xs text-[var(--text-main)]"
              x-text="draftState.restored ? '已恢复本地草稿' : (draftState.savedAt ? '已自动保存草稿' : '暂无本地草稿')"
            ></div>
          </div>
        </div>
      </aside>
    </div>
  </div>
</div>
